<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Colibri Business</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    body { margin:0; font-family: Arial; background:#e6f0ff; }
    header {
      background:#1E3A8A;
      color:white;
      padding:16px;
      font-size:20px;
      font-weight:bold;
    }
    .client-item {
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:12px 14px;
      border-bottom:1px solid #ddd;
      background:white;
      border-radius:12px;
      margin:6px 12px;
    }
    .client-info {
      display:flex;
      align-items:center;
      gap:12px;
    }
    .client-avatar {
      width:48px;
      height:48px;
      border-radius:50%;
      background:#1E40AF;
      color:white;
      display:flex;
      align-items:center;
      justify-content:center;
      font-weight:bold;
      font-size:18px;
      flex-shrink:0;
    }
    .client-info div {
      display:flex;
      flex-direction:column;
    }
    .client-item i {
      cursor:pointer;
      padding:8px;
      color:#1E3A8A;
    }
    .fab {
      position:fixed;
      bottom:70px;
      right:20px;
      background:#1E3A8A;
      color:white;
      width:56px;
      height:56px;
      border-radius:50%;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:22px;
      cursor:pointer;
    }
    .menu-bas {
      position:fixed;
      bottom:0;
      width:100%;
      background:#1E40AF;
      display:flex;
      justify-content:space-around;
      padding:10px 0;
    }
    .menu-bas a {
      color:white;
      font-size:20px;
      text-decoration:none;
    }

    /* MODAL */
    .modal {
      position:fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
      background:rgba(0,0,0,0.4);
      display:none;
      align-items:center;
      justify-content:center;
    }
    .modal-content {
      background:white;
      width:90%;
      max-width:300px;
      border-radius:12px;
      overflow:hidden;
    }
    .modal-content button {
      width:100%;
      padding:14px;
      border:none;
      background:white;
      cursor:pointer;
      text-align:left;
      font-size:16px;
    }
    .modal-content button:hover {
      background:#f2f2f2;
    }
  </style>
</head>

<body>

<header>Clients</header>

<main id="clientList"></main>

<button class="fab" onclick="goAddClient()">
  <i class="fas fa-plus"></i>
</button>

<nav class="menu-bas">
  <a href="index.html"><i class="fas fa-home"></i></a>
  <a href="achat.html"><i class="fas fa-cart-shopping"></i></a>
  <a href="commandes.html"><i class="fas fa-box"></i></a>
  <a href="paiements.html"><i class="fas fa-credit-card"></i></a>
  <a href="statistiques.html"><i class="fas fa-chart-line"></i></a>
  <a href="chaines.html"><i class="fas fa-rss"></i></a>
</nav>

<!-- MODAL OPTIONS -->
<div class="modal" id="optionsModal" onclick="closeModal(event)">
  <div class="modal-content">
    <button onclick="editClient()">Modifier</button>
    <button onclick="deleteClient()">Supprimer</button>
    <button onclick="closeModal()">Annuler</button>
  </div>
</div>

<script>
let selectedClientId = null;

function goAddClient() {
  location.href = "addclient.html";
}

function loadClients() {
  const list = document.getElementById("clientList");
  list.innerHTML = "";

  const clients = JSON.parse(localStorage.getItem("clients")) || [];

  if (clients.length === 0) {
    list.innerHTML = "<p style='padding:16px;text-align:center;color:#1E40AF'>Aucun client</p>";
    return;
  }

  clients.forEach(c => {
    const div = document.createElement("div");
    div.className = "client-item";

    const avatarLetter = c.nom ? c.nom.charAt(0).toUpperCase() : "?";

    div.innerHTML = `
      <div class="client-info">
        <div class="client-avatar">${avatarLetter}</div>
        <div>
          <strong>${c.nom}</strong>
          <small>${c.tel}</small>
        </div>
      </div>
      <i class="fas fa-ellipsis-vertical" onclick="openModal('${c.id}', event)"></i>
    `;
    list.appendChild(div);
  });
}

function openModal(id, event) {
  event.stopPropagation();
  selectedClientId = id;
  document.getElementById("optionsModal").style.display = "flex";
}

function closeModal(e) {
  if (!e || e.target.className === "modal") {
    document.getElementById("optionsModal").style.display = "none";
  }
}

function editClient() {
  localStorage.setItem("editClientId", selectedClientId);
  location.href = "addclient.html";
}

function deleteClient() {
  let clients = JSON.parse(localStorage.getItem("clients")) || [];
  clients = clients.filter(c => c.id !== selectedClientId);
  localStorage.setItem("clients", JSON.stringify(clients));
  closeModal();
  loadClients();
}

document.addEventListener("DOMContentLoaded", loadClients);
</script>

</body>
</html>
