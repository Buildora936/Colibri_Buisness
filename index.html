<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Colibri Business</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>

<header>
  <h1>Clients</h1>
</header>

<main id="clientList"></main>

<button class="fab" onclick="goAddClient()">
  <i class="fas fa-plus"></i>
</button>

<nav class="menu-bas">
  <a href="index.html"><i class="fas fa-home"></i></a>
  <a href="achat.html"><i class="fas fa-cart-shopping"></i></a>
  <a href="commandes.html"><i class="fas fa-box"></i></a>
  <a href="paiements.html"><i class="fas fa-credit-card"></i></a>
  <a href="statistiques.html"><i class="fas fa-chart-line"></i></a>
  <a href="chaines.html"><i class="fas fa-rss"></i></a>
</nav>


<script>
let currentId = null;

function goAddClient() {
  window.location.href = "addclient.html";
}

function loadClients() {
  const list = document.getElementById("clientList");
  list.innerHTML = "";

  let clients = JSON.parse(localStorage.getItem("clients")) || [];

  if (clients.length === 0) {
    list.innerHTML = "<p>Aucun client</p>";
    return;
  }

  clients.forEach(c => {
    const div = document.createElement("div");
    div.className = "client-item";
    div.onclick = () => openEdit(c.id);

    div.innerHTML = `
      <div>
        <strong>${c.nom}</strong><br>
        <small>${c.tel}</small>
      </div>
      <i class="fas fa-ellipsis-vertical"></i>
    `;
    list.appendChild(div);
  });
}

function openEdit(id) {
  let clients = JSON.parse(localStorage.getItem("clients")) || [];
  let c = clients.find(x => x.id === id);
  if (!c) return;

  currentId = id;
  editNom.value = c.nom;
  editTel.value = c.tel;
  editModal.style.display = "flex";
}

function closeEdit() {
  editModal.style.display = "none";
}

function saveEdit() {
  let clients = JSON.parse(localStorage.getItem("clients")) || [];
  let i = clients.findIndex(x => x.id === currentId);
  if (i === -1) return;

  clients[i].nom = editNom.value;
  clients[i].tel = editTel.value;
  localStorage.setItem("clients", JSON.stringify(clients));
  closeEdit();
  loadClients();
}


document.addEventListener("DOMContentLoaded", loadClients);
</script>

</body>
</html>
