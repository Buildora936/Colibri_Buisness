<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Chaînes - Colibri Business</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>

<header>
  <h1>Chaînes</h1>
</header>

<div class="pub-banner">ESPACE PUBLICITAIRE</div>

<main id="chaineList"></main>

<button class="fab" onclick="openAddChaine()">+</button>

<div id="modalChaine" class="modal">
  <div class="modal-content">
    <h2>Nouvelle annonce</h2>

    <textarea id="texteChaine" placeholder="Écris ton annonce..."></textarea>

    <button onclick="saveChaine()">Publier</button>
    <button onclick="closeChaine()">Annuler</button>
  </div>
</div>

<nav class="menu-bas">
  <a href="achat.html"><i class="fas fa-cart-shopping"></i></a>
  <a href="commandes.html"><i class="fas fa-box"></i></a>
  <a href="paiements.html"><i class="fas fa-credit-card"></i></a>
  <a href="statistiques.html"><i class="fas fa-chart-line"></i></a>
  <a href="chaines.html"><i class="fas fa-rss"></i></a>
</nav>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-app.js";
  import { getFirestore, collection, addDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyA45eoz8QZbHdFlOmuK6l6yjfJC3JaF2jQ",
    authDomain: "collibri-buisiness.firebaseapp.com",
    projectId: "collibri-buisiness",
    storageBucket: "collibri-buisiness.firebasestorage.app",
    messagingSenderId: "812403400254",
    appId: "1:812403400254:web:773de4e308a172d614fb6f",
    measurementId: "G-PMS7V901Y1"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  window.openAddChaine = () => modalChaine.style.display = "flex";
  window.closeChaine = () => modalChaine.style.display = "none";

  window.saveChaine = async () => {
    const texte = texteChaine.value.trim();
    if (!texte) return alert("Message vide");

    await addDoc(collection(db, "annonces"), {
      texte,
      date: new Date()
    });

    texteChaine.value = "";
    closeChaine();
  };

  function loadChaines() {
    const q = query(collection(db, "annonces"), orderBy("date", "desc"));
    onSnapshot(q, snapshot => {
      chaineList.innerHTML = "";
      snapshot.forEach(doc => {
        const c = doc.data();
        const div = document.createElement("div");
        div.className = "client-item";
        div.innerHTML = `<div><strong>Annonce</strong><br><small>${c.texte}</small><br><small style="opacity:0.6">${new Date(c.date.seconds * 1000).toLocaleString()}</small></div>`;
        chaineList.appendChild(div);
      });
    });
  }

  loadChaines();
</script>
</body>
</html>
