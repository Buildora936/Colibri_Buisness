<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Chaînes - Colibri Business</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>

<header>
  <h1>Chaînes</h1>
</header>

<div class="pub-banner">ESPACE PUBLICITAIRE</div>

<main id="chaineList"></main>

<button class="fab" onclick="openAddChaine()">+</button>

<div id="modalChaine" class="modal">
  <div class="modal-content">
    <h2>Nouvelle annonce</h2>

    <textarea id="texteChaine" placeholder="Écris ton annonce..."></textarea>

    <button onclick="saveChaine()">Publier</button>
    <button onclick="closeChaine()">Annuler</button>
  </div>
</div>

<nav class="menu-bas">
  <a href="achat.html"><i class="fas fa-cart-shopping"></i></a>
  <a href="commandes.html"><i class="fas fa-box"></i></a>
  <a href="paiements.html"><i class="fas fa-credit-card"></i></a>
  <a href="statistiques.html"><i class="fas fa-chart-line"></i></a>
  <a href="chaines.html"><i class="fas fa-rss"></i></a>
</nav>

<script>
let chaines = JSON.parse(localStorage.getItem("chaines")) || [];

function openAddChaine() {
  document.getElementById("modalChaine").style.display = "flex";
}

function closeChaine() {
  document.getElementById("modalChaine").style.display = "none";
}

function saveChaine() {
  const texte = document.getElementById("texteChaine").value;
  if (!texte) return alert("Message vide");

  chaines.unshift({
    texte,
    date: new Date().toLocaleString()
  });

  localStorage.setItem("chaines", JSON.stringify(chaines));
  document.getElementById("texteChaine").value = "";

  closeChaine();
  loadChaines();
}

function loadChaines() {
  const list = document.getElementById("chaineList");
  list.innerHTML = "";

  chaines.forEach(c => {
    const div = document.createElement("div");
    div.className = "client-item";
    div.innerHTML = `
      <div>
        <strong>Annonce</strong><br>
        <small>${c.texte}</small><br>
        <small style="opacity:0.6">${c.date}</small>
      </div>
    `;
    list.appendChild(div);
  });
}

loadChaines();
</script>

</body>
</html>
