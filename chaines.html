<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Chaînes - Colibri Business</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
body{margin:0;font-family:Arial;background:#e6f0ff}
header{padding:16px;background:#1E3A8A;color:white;text-align:center;font-size:22px;font-weight:bold}
.pub-banner{background:#cce0ff;color:#1E3A8A;text-align:center;padding:12px;margin:0}
.container{padding:12px;display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:12px}
.card{background:white;border-radius:14px;padding:12px;box-shadow:0 2px 6px rgba(0,0,0,0.05)}
.card img{width:100%;border-radius:12px;margin-top:8px}
.card iframe{width:100%;height:180px;border-radius:12px;margin-top:8px}
.fab{position:fixed;bottom:80px;right:20px;background:#1E3A8A;color:white;border-radius:50%;width:56px;height:56px;font-size:28px;display:flex;align-items:center;justify-content:center;cursor:pointer}
.menu-bas{position:fixed;bottom:0;width:100%;background:white;display:flex;justify-content:space-around;padding:10px 0;box-shadow:0 -2px 6px rgba(0,0,0,0.1)}
.menu-bas a{color:#1E3A8A;font-size:22px;text-decoration:none}
</style>
</head>
<body>

<header>Chaînes</header>
<div class="pub-banner">ESPACE PUBLICITAIRE</div>

<div class="container" id="chaineList"></div>

<div class="fab" onclick="location.href='addchaines.html'"><i class="fas fa-plus"></i></div>

<nav class="menu-bas">
  <a href="index.html"><i class="fas fa-home"></i></a>
  <a href="achat.html"><i class="fas fa-cart-shopping"></i></a>
  <a href="commandes.html"><i class="fas fa-box"></i></a>
  <a href="paiements.html"><i class="fas fa-credit-card"></i></a>
  <a href="statistiques.html"><i class="fas fa-chart-line"></i></a>
  <a href="chaines.html"><i class="fas fa-rss"></i></a>
</nav>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-app.js";
import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-database.js";

const app = initializeApp({
 apiKey:"AIzaSyA45eoz8QZbHdFlOmuK6l6yjfJC3JaF2jQ",
 authDomain:"collibri-buisiness.firebaseapp.com",
 databaseURL:"https://collibri-buisiness-default-rtdb.firebaseio.com",
 projectId:"collibri-buisiness"
});
const db = getDatabase(app);

const chaineList = document.getElementById("chaineList");

async function loadChaines(){
  chaineList.innerHTML="";
  const snap = await get(ref(db,"chaines"));
  if(!snap.exists()) return;
  Object.values(snap.val()).forEach(c=>{
    const div = document.createElement("div");
    div.className="card";
    div.innerHTML=`
      <p>${c.texte}</p>
      ${c.image?`<img src="${c.image}" alt="image">`:``}
      ${c.video?`<iframe src="${c.video}" frameborder="0" allowfullscreen></iframe>`:``}
      <small style="opacity:0.6">${c.date}</small>
    `;
    chaineList.appendChild(div);
  });
}

loadChaines();
</script>

</body>
</html>
