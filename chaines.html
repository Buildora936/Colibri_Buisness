<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Chaînes - Colibri Business</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
body{margin:0;font-family:Arial;background:#e6f0ff}
header{padding:16px;background:#1E3A8A;color:white;text-align:center;font-size:22px;font-weight:bold}
.pub-banner{padding:12px;background:#93c5fd;text-align:center;margin:12px;border-radius:12px}
.menu-bas{position:fixed;bottom:0;width:100%;background:#1E40AF;display:flex;justify-content:space-around;padding:10px 0;box-shadow:0 -2px 6px rgba(0,0,0,0.1)}
.menu-bas a{color:white;font-size:20px;text-decoration:none}
.container{padding:12px;display:grid;grid-template-columns:1fr;gap:12px}
.card{background:white;border-radius:14px;padding:12px;box-shadow:0 2px 6px rgba(0,0,0,0.05)}
.card h3{margin:0;font-size:20px;color:#1E3A8A}
.card small{opacity:0.7}
.card img{width:100%;border-radius:12px;margin-top:8px}
.card iframe{width:100%;height:180px;border-radius:12px;margin-top:8px}
textarea,input{width:100%;padding:10px;border-radius:10px;border:1px solid #ccc;margin-top:8px}
button{padding:10px 14px;margin-top:8px;border:none;border-radius:10px;cursor:pointer;font-weight:bold}
.btn-primary{background:#1E3A8A;color:white}
.btn-danger{background:red;color:white}
.heart{font-size:28px;cursor:pointer;float:right}
.heart.red{color:red}
.search-container{margin:12px;display:flex;gap:8px}
.search-container input{flex:1;padding:10px;border-radius:10px;border:1px solid #ccc}
</style>
</head>

<body>

<header>Chaînes - Annonces publiques</header>
<div class="pub-banner">ESPACE PUBLICITAIRE</div>

<div class="search-container">
  <input type="text" id="searchInput" placeholder="Rechercher une annonce...">
</div>

<div class="container">
  <h3>Ajouter une annonce</h3>
  <textarea id="texteChaine" placeholder="Écris ton annonce..."></textarea>
  <input type="text" id="imageChaine" placeholder="URL image (facultatif)">
  <input type="text" id="videoChaine" placeholder="URL vidéo YouTube (facultatif)">
  <button class="btn-primary" onclick="saveChaine()">Publier</button>
</div>

<div class="container" id="chaineList"></div>

<nav class="menu-bas">
 <a href="achat.html"><i class="fas fa-cart-shopping"></i></a>
 <a href="commandes.html"><i class="fas fa-box"></i></a>
 <a href="paiements.html"><i class="fas fa-credit-card"></i></a>
 <a href="statistiques.html"><i class="fas fa-chart-line"></i></a>
 <a href="vente.html"><i class="fas fa-store"></i></a>
</nav>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-app.js";
import { getDatabase, ref, get, set, remove, push } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-database.js";

// Init Firebase
const app = initializeApp({
 apiKey:"AIzaSyA45eoz8QZbHdFlOmuK6l6yjfJC3JaF2jQ",
 authDomain:"collibri-buisiness.firebaseapp.com",
 databaseURL:"https://collibri-buisiness-default-rtdb.firebaseio.com",
 projectId:"collibri-buisiness"
});
const db = getDatabase(app);

const currentUser = "utilisateur1"; // simulateur utilisateur connecté
const chaineList = document.getElementById("chaineList");

// Ajouter une annonce
async function saveChaine(){
 const texte = document.getElementById("texteChaine").value.trim();
 const image = document.getElementById("imageChaine").value.trim();
 const video = document.getElementById("videoChaine").value.trim();

 if(!texte){alert("Message vide"); return;}

 const newRef = push(ref(db,"chaines"));
 await set(newRef,{
   texte, image, video, userId: currentUser, date:new Date().toLocaleString()
 });

 document.getElementById("texteChaine").value="";
 document.getElementById("imageChaine").value="";
 document.getElementById("videoChaine").value="";
 loadChaines();
}

// Charger toutes les annonces
async function loadChaines(){
 const search = document.getElementById("searchInput").value.toLowerCase();
 chaineList.innerHTML="";
 const snap = await get(ref(db,"chaines"));
 if(!snap.exists()) return;

 Object.entries(snap.val()).forEach(([id,c])=>{
   if(search && !c.texte.toLowerCase().includes(search)) return;

   const div = document.createElement("div");
   div.className="card";
   div.innerHTML=`
     <span class="heart" id="fav-${id}">🤍</span>
     <h3>Annonce</h3>
     <small>${c.date}</small>
     <p>${c.texte}</p>
     ${c.image?`<img src="${c.image}" alt="image">`:``}
     ${c.video?`<iframe src="${c.video}" frameborder="0" allowfullscreen></iframe>`:``}
     ${c.userId===currentUser?`<button class="btn-danger" id="suppr-${id}">Supprimer</button>`:""}
   `;
   chaineList.appendChild(div);

   // Toggle favori
   const favBtn = document.getElementById(`fav-${id}`);
   favBtn.onclick = async ()=>{
     const favRef = ref(db,`favoris/${currentUser}/${id}`);
     const s = await get(favRef);
     s.exists()?remove(favRef):set(favRef,true);
     favBtn.classList.toggle("red");
   };

   // Supprimer si utilisateur propriétaire
   const supBtn = document.getElementById(`suppr-${id}`);
   if(supBtn){
     supBtn.onclick = async ()=>{
       if(confirm("Supprimer cette annonce ?")){
         await remove(ref(db,`chaines/${id}`));
         loadChaines();
       }
     }
   }
 });
}

// Recherche dynamique
document.getElementById("searchInput").addEventListener("input",loadChaines);

loadChaines();
</script>

</body>
</html>
