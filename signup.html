<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Inscription - Colibri Business</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
</head>
<body>

<h2>Inscription</h2>

<input id="email" type="email" placeholder="Email">
<input id="password" type="password" placeholder="Mot de passe">
<select id="type">
  <option value="">Sélectionnez le type</option>
  <option value="client">Client</option>
  <option value="professionnel">Professionnel</option>
</select>
<button onclick="signup()">S’inscrire</button>
<p>Déjà inscrit ? <a href="login.html">Se connecter</a></p>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-auth.js";
import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-database.js";

const firebaseConfig = {
 apiKey:"AIzaSyA45eoz8QZbHdFlOmuK6l6yjfJC3JaF2jQ",
 authDomain:"collibri-buisiness.firebaseapp.com",
 databaseURL:"https://collibri-buisiness-default-rtdb.firebaseio.com",
 projectId:"collibri-buisiness"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth();
const db = getDatabase(app);

window.signup = async ()=>{
 const email = document.getElementById("email").value.trim();
 const password = document.getElementById("password").value.trim();
 const type = document.getElementById("type").value;
 if(!email || !password || !type){ alert("Remplir tous les champs"); return; }
 try{
   const userCred = await createUserWithEmailAndPassword(auth,email,password);
   const uid = userCred.user.uid;
   await set(ref(db,"users/"+uid),{email,type});
   if(type==="professionnel"){
     window.location.href="profil-pro.html";
   } else {
     window.location.href="achat.html";
   }
 } catch(e){ alert("Erreur: "+e.message); }
};
</script>
</body>
</html>
