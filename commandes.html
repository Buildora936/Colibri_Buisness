<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Commandes - Colibri Business</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<header>
  <h1>Commandes</h1>
</header>

<main id="commandeList"></main>

<nav class="menu-bas">
  <a href="index.html"><i class="fas fa-home"></i></a>
  <a href="achat.html"><i class="fas fa-cart-shopping"></i></a>
  <a href="commandes.html"><i class="fas fa-box"></i></a>
  <a href="paiements.html"><i class="fas fa-credit-card"></i></a>
  <a href="statistiques.html"><i class="fas fa-chart-line"></i></a>
  <a href="chaines.html"><i class="fas fa-rss"></i></a>
</nav>

<script>
function loadCommandes() {
  const list = document.getElementById("commandeList");
  list.innerHTML = "";
  let commandes = JSON.parse(localStorage.getItem("commandes")) || [];
  if (commandes.length === 0) {
    list.innerHTML = "<p style='text-align:center;margin-top:20px;'>Aucune commande</p>";
    return;
  }
  commandes.forEach(c => {
    const div = document.createElement("div");
    div.className = "commande-item";
    div.innerHTML = `
      <strong>${c.nomProduit}</strong><br>
      <small>Client: ${c.client} - Qté: ${c.quantite}</small><br>
      <small>Prix: ${c.prix} HTG</small>
    `;
    list.appendChild(div);
  });
}

document.addEventListener("DOMContentLoaded", loadCommandes);
</script>

</body>
</html>
