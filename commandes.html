<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Commandes - Colibri Business</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>

<header>
  <h1>Commandes</h1>
</header>

<main id="commandeList"></main>

<button class="fab" onclick="openAddCommande()">+</button>

<!-- MODAL -->
<div id="modalCommande" class="modal">
  <div class="modal-content">

    <h2>Nouvelle commande</h2>

    <select id="produitSelect"></select>

    <input type="number" id="qte" placeholder="Quantité">

    <select id="statut">
      <option value="En attente">En attente</option>
      <option value="Payé">Payé</option>
    </select>

    <button onclick="saveCommande()">Enregistrer</button>
    <button onclick="closeModal()">Annuler</button>

  </div>
</div>

<nav class="menu-bas">
  <a href="achat.html"><i class="fas fa-cart-shopping"></i></a>
  <a href="commandes.html"><i class="fas fa-box"></i></a>
  <a href="paiements.html"><i class="fas fa-credit-card"></i></a>
  <a href="statistiques.html"><i class="fas fa-chart-line"></i></a>
  <a href="chaines.html"><i class="fas fa-rss"></i></a>
</nav>

<script>
let commandes = JSON.parse(localStorage.getItem("commandes")) || [];

function loadProduits() {
  const select = document.getElementById("produitSelect");
  select.innerHTML = "";

  let ventes = JSON.parse(localStorage.getItem("ventes")) || [];

  ventes.forEach(v => {
    let opt = document.createElement("option");
    opt.value = v.nom;
    opt.textContent = `${v.nom} - ${v.prix}`;
    opt.dataset.prix = v.prix;
    select.appendChild(opt);
  });
}

function openAddCommande() {
  let ventes = JSON.parse(localStorage.getItem("ventes")) || [];

  if (ventes.length === 0) {
    alert("Ajoutez d'abord un produit");
    return;
  }

  loadProduits();
  document.getElementById("modalCommande").style.display = "flex";
}

function closeModal() {
  document.getElementById("modalCommande").style.display = "none";
}

function saveCommande() {
  const select = document.getElementById("produitSelect");
  const produit = select.value;
  const prix = select.selectedOptions[0].dataset.prix;
  const qte = document.getElementById("qte").value;
  const statut = document.getElementById("statut").value;

  if (!qte) return alert("Quantité requise");

  commandes.push({ produit, prix, qte, statut });
  localStorage.setItem("commandes", JSON.stringify(commandes));

  closeModal();
  loadCommandes();
}

function loadCommandes() {
  const list = document.getElementById("commandeList");
  list.innerHTML = "";

  commandes.forEach(c => {
    const total = c.qte * c.prix;

    const div = document.createElement("div");
    div.className = "client-item";
    div.innerHTML = `
      <div>
        <strong>${c.produit}</strong><br>
        <small>${c.qte} × ${c.prix} = ${total} • ${c.statut}</small>
      </div>
    `;
    list.appendChild(div);
  });
}

loadCommandes();
</script>

</body>
</html>
