<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Commandes - Colibri Business</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>

<header>
  <h1>Commandes</h1>
</header>

<main id="commandeList"></main>

<!-- Bouton + -->
<button class="fab" onclick="openAddCommande()">
  <i class="fas fa-plus"></i>
</button>

<!-- MENU BAS -->
<nav class="menu-bas">
  <a href="achat.html"><i class="fas fa-cart-shopping"></i></a>
  <a href="commandes.html"><i class="fas fa-box"></i></a>
  <a href="paiements.html"><i class="fas fa-credit-card"></i></a>
  <a href="statistiques.html"><i class="fas fa-chart-line"></i></a>
  <a href="chaines.html"><i class="fas fa-rss"></i></a>
</nav>

<!-- MODAL COMMANDE -->
<div id="commandeModal" class="modal">
  <div class="modal-content">

    <h2>Nouvelle commande</h2>

    <label>Client</label>
    <select id="cClient"></select>

    <label>Produit</label>
    <select id="cProduit"></select>

    <label>Quantité</label>
    <input id="cQte" type="number" value="1">

    <label>Statut</label>
    <select id="cStatut">
      <option>En cours</option>
      <option>Payée</option>
    </select>

    <button class="btn-primary" onclick="saveCommande()">Enregistrer</button>
    <button class="btn-danger" onclick="deleteCommande()">Supprimer</button>
    <button class="btn-cancel" onclick="closeCommande()">Annuler</button>

  </div>
</div>

<script>
let currentCommandeId = null;

/* CHARGEMENT */
function loadCommandes() {
  const list = document.getElementById("commandeList");
  list.innerHTML = "";

  let commandes = JSON.parse(localStorage.getItem("commandes")) || [];

  if (commandes.length === 0) {
    list.innerHTML = "<p>Aucune commande</p>";
    return;
  }

  commandes.forEach(c => {
    const div = document.createElement("div");
    div.className = "client-item";
    div.onclick = () => openEditCommande(c.id);

    div.innerHTML = `
      <div>
        <strong>${c.client}</strong><br>
        <small>${c.produit} • ${c.qte} × ${c.prix} HTG • ${c.statut}</small>
      </div>
      <i class="fas fa-pen"></i>
    `;
    list.appendChild(div);
  });
}

/* OUVRIR MODAL */
function openAddCommande() {
  currentCommandeId = null;
  loadClients();
  loadProduits();
  cQte.value = 1;
  cStatut.value = "En cours";
  commandeModal.style.display = "flex";
}

/* CLIENTS */
function loadClients() {
  let clients = JSON.parse(localStorage.getItem("clients")) || [];
  cClient.innerHTML = clients.map(c =>
    `<option value="${c.nom}">${c.nom}</option>`
  ).join("");
}

/* PRODUITS */
function loadProduits() {
  let ventes = JSON.parse(localStorage.getItem("ventes")) || [];
  cProduit.innerHTML = ventes.map(v =>
    `<option value="${v.id}" data-prix="${v.prix}">${v.titre}</option>`
  ).join("");
}

/* SAUVEGARDER */
function saveCommande() {
  const client = cClient.value;
  const produitOption = cProduit.options[cProduit.selectedIndex];
  const produit = produitOption.text;
  const prix = produitOption.dataset.prix;
  const qte = cQte.value;
  const statut = cStatut.value;

  let commandes = JSON.parse(localStorage.getItem("commandes")) || [];

  if (currentCommandeId) {
    let i = commandes.findIndex(x => x.id === currentCommandeId);
    commandes[i] = { id: currentCommandeId, client, produit, prix, qte, statut };
  } else {
    commandes.push({
      id: Date.now(),
      client,
      produit,
      prix,
      qte,
      statut
    });
  }

  localStorage.setItem("commandes", JSON.stringify(commandes));
  closeCommande();
  loadCommandes();
}

function openEditCommande(id) {
  let commandes = JSON.parse(localStorage.getItem("commandes")) || [];
  let c = commandes.find(x => x.id === id);
  if (!c) return;

  currentCommandeId = id;
  loadClients();
  loadProduits();

  setTimeout(() => {
    cClient.value = c.client;
    cQte.value = c.qte;
    cStatut.value = c.statut;
  }, 100);

  commandeModal.style.display = "flex";
}

function deleteCommande() {
  let commandes = JSON.parse(localStorage.getItem("commandes")) || [];
  commandes = commandes.filter(x => x.id !== currentCommandeId);
  localStorage.setItem("commandes", JSON.stringify(commandes));
  closeCommande();
  loadCommandes();
}

function closeCommande() {
  commandeModal.style.display = "none";
}

document.addEventListener("DOMContentLoaded", loadCommandes);
</script>

</body>
</html>
