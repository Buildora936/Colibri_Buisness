<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Achat - Colibri Business</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>

<header>
  <h1>Salle d’Achat</h1>
</header>

<!-- PUB BANNER -->
<div class="pub-banner">
  ESPACE PUBLICITAIRE
</div>

<main id="achatList"></main>

<button class="fab" onclick="openAddAchat()">+</button>

<div id="modalAchat" class="modal">
  <div class="modal-content">
    <h2>Nouvel achat</h2>

    <input type="text" id="nomAchat" placeholder="Produit / Service">
    <input type="number" id="montantAchat" placeholder="Montant">

    <button onclick="saveAchat()">Enregistrer</button>
    <button onclick="closeAchat()">Annuler</button>
  </div>
</div>

<nav class="menu-bas">
  <a href="achat.html"><i class="fas fa-cart-shopping"></i></a>
  <a href="commandes.html"><i class="fas fa-box"></i></a>
  <a href="paiements.html"><i class="fas fa-credit-card"></i></a>
  <a href="statistiques.html"><i class="fas fa-chart-line"></i></a>
  <a href="chaines.html"><i class="fas fa-rss"></i></a>
</nav>

<script>
let achats = JSON.parse(localStorage.getItem("achats")) || [];

function openAddAchat() {
  document.getElementById("modalAchat").style.display = "flex";
}

function closeAchat() {
  document.getElementById("modalAchat").style.display = "none";
}

function saveAchat() {
  const nom = document.getElementById("nomAchat").value;
  const montant = document.getElementById("montantAchat").value;

  if (!nom || !montant) return alert("Champs requis");

  achats.push({ nom, montant });
  localStorage.setItem("achats", JSON.stringify(achats));

  closeAchat();
  loadAchats();
}

function loadAchats() {
  const list = document.getElementById("achatList");
  list.innerHTML = "";

  achats.forEach(a => {
    const div = document.createElement("div");
    div.className = "client-item";
    div.innerHTML = `
      <div>
        <strong>${a.nom}</strong><br>
        <small>${a.montant} HTG</small>
      </div>
    `;
    list.appendChild(div);
  });
}

loadAchats();
</script>

</body>
</html>
