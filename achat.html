<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Salle d’Achat</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
body{margin:0;font-family:Arial;background:#e6f0ff}
header{padding:16px;background:#1E3A8A;color:white;text-align:center;font-size:22px}
.card{background:white;border-radius:14px;padding:12px;margin:12px}
.card img{width:100%;border-radius:12px}
.heart{font-size:22px;cursor:pointer}
.heart.red{color:red}
</style>
</head>

<body>

<header>Salle d’Achat</header>
<div id="achatList"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-app.js";
import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-database.js";

const app = initializeApp({
 apiKey:"AIzaSyA45eoz8QZbHdFlOmuK6l6yjfJC3JaF2jQ",
 authDomain:"collibri-buisiness.firebaseapp.com",
 databaseURL:"https://collibri-buisiness-default-rtdb.firebaseio.com",
 projectId:"collibri-buisiness"
});

const db=getDatabase(app);
const list=document.getElementById("achatList");

async function load(){
 const snap=await get(ref(db,"produits"));
 if(!snap.exists()) return;
 Object.entries(snap.val()).forEach(([id,p])=>{
  const d=document.createElement("div");
  d.className="card";
  d.innerHTML=`
   <span class="heart">🤍</span>
   <img src="${p.image}" onclick="location.href='produit.html?id=${id}'">
   <h3>${p.nom}</h3>
   <b>${p.prix} USD</b>
   <p>${p.description}</p>
  `;
  list.appendChild(d);
  d.querySelector(".heart").onclick=()=>d.querySelector(".heart").classList.toggle("red");
 });
}
load();
</script>

</body>
</html>
