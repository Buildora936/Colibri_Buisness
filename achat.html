<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Achat - Colibri Business</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>

<header>
  <h1>Explorer les produits</h1>
</header>

<div class="pub-banner">ESPACE PUBLICITAIRE</div>

<!-- 🔍 RECHERCHE -->
<section style="padding:16px">
  <input id="search" placeholder="🔍 Rechercher un produit..." oninput="filtrer()">
</section>

<main id="produitList"></main>

<nav class="menu-bas">
  <a href="index.html"><i class="fas fa-home"></i></a>
  <a href="achat.html"><i class="fas fa-cart-shopping"></i></a>
  <a href="statistiques.html"><i class="fas fa-chart-line"></i></a>
</nav>

<!-- FIREBASE -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-app.js";
  import { getDatabase, ref, onValue } from
    "https://www.gstatic.com/firebasejs/12.7.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyA45eoz8QZbHdFlOmuK6l6yjfJC3JaF2jQ",
    authDomain: "collibri-buisiness.firebaseapp.com",
    databaseURL: "https://collibri-buisiness-default-rtdb.firebaseio.com",
    projectId: "collibri-buisiness",
    messagingSenderId: "812403400254",
    appId: "1:812403400254:web:773de4e308a172d614fb6f"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const produitsRef = ref(db, "produits");

  let produits = [];

  onValue(produitsRef, snap => {
    produits = [];
    snap.forEach(c => produits.push(c.val()));
    afficher(produits);
  });

  function afficher(list) {
    produitList.innerHTML = "";

    list.reverse().forEach(p => {
      const div = document.createElement("div");
      div.className = "client-item";

      div.innerHTML = `
        <img src="${p.image}" style="width:100%;border-radius:12px;margin-bottom:8px">

        <strong>${p.nom}</strong><br>
        <small>${p.prix} USD</small><br>

        <small style="opacity:.7;cursor:pointer"
          onclick="voirVendeur('${p.vendeur}')">
          👤 ${p.vendeur}
        </small>

        <button style="margin-top:8px;width:100%"
          onclick="commander('${p.nom}', '${p.vendeur}')">
          Commander
        </button>
      `;

      produitList.appendChild(div);
    });
  }

  window.filtrer = () => {
    const v = search.value.toLowerCase();
    afficher(produits.filter(p =>
      p.nom.toLowerCase().includes(v)
    ));
  };

  // 🛒 COMMANDE (POUR L’INSTANT SIMPLE)
  window.commander = (produit, vendeur) => {
    alert(`Commande : ${produit}\nVendeur : ${vendeur}`);
  };

  // 👤 PROFIL VENDEUR (MINI)
  window.voirVendeur = vendeur => {
    alert("Profil vendeur : " + vendeur);
  };
</script>

</body>
</html>
