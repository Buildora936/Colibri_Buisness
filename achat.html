<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Achat - Colibri Business</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>

<header>
  <h1>Achats</h1>
</header>

<main id="achatList">
  <!-- Achats affichés ici -->
</main>

<!-- Bouton + -->
<button class="fab" onclick="openAddAchat()">
  <i class="fas fa-plus"></i>
</button>

<!-- MENU BAS -->
<nav class="menu-bas">
  <a href="achat.html"><i class="fas fa-cart-shopping"></i></a>
  <a href="commandes.html"><i class="fas fa-box"></i></a>
  <a href="paiements.html"><i class="fas fa-credit-card"></i></a>
  <a href="statistiques.html"><i class="fas fa-chart-line"></i></a>
  <a href="chaines.html"><i class="fas fa-rss"></i></a>
</nav>

<!-- MODAL AJOUT / MODIFICATION -->
<div id="achatModal" class="modal">
  <div class="modal-content">

    <h2>Achat</h2>

    <label>Titre / Produit</label>
    <input id="aTitre" placeholder="Ex : Achat stock">

    <label>Description</label>
    <input id="aDesc" placeholder="Détails de l'achat">

    <label>Montant</label>
    <input id="aMontant" type="number" placeholder="Ex : 3000">

    <label>Date</label>
    <input id="aDate" type="date">

    <button class="btn-primary" onclick="saveAchat()">Enregistrer</button>
    <button class="btn-danger" onclick="deleteAchat()">Supprimer</button>
    <button class="btn-cancel" onclick="closeAchat()">Annuler</button>

  </div>
</div>

<script>
let currentAchatId = null;

function loadAchats() {
  const list = document.getElementById("achatList");
  list.innerHTML = "";

  let achats = JSON.parse(localStorage.getItem("achats")) || [];

  if (achats.length === 0) {
    list.innerHTML = "<p>Aucun achat enregistré</p>";
    return;
  }

  achats.forEach(a => {
    const div = document.createElement("div");
    div.className = "client-item";
    div.onclick = () => openEditAchat(a.id);

    div.innerHTML = `
      <div>
        <strong>${a.titre}</strong><br>
        <small>${a.desc} • ${a.montant} HTG • ${a.date}</small>
      </div>
      <i class="fas fa-pen"></i>
    `;

    list.appendChild(div);
  });
}

function openAddAchat() {
  currentAchatId = null;
  aTitre.value = "";
  aDesc.value = "";
  aMontant.value = "";
  aDate.valueAsDate = new Date();
  achatModal.style.display = "flex";
}

function openEditAchat(id) {
  let achats = JSON.parse(localStorage.getItem("achats")) || [];
  let a = achats.find(x => x.id === id);
  if (!a) return;

  currentAchatId = id;
  aTitre.value = a.titre;
  aDesc.value = a.desc;
  aMontant.value = a.montant;
  aDate.value = a.date;
  achatModal.style.display = "flex";
}

function closeAchat() {
  achatModal.style.display = "none";
}

function saveAchat() {
  const titre = aTitre.value.trim();
  const desc = aDesc.value.trim();
  const montant = aMontant.value;
  const date = aDate.value;

  if (!titre || !montant || !date) {
    alert("Titre, montant et date sont obligatoires");
    return;
  }

  let achats = JSON.parse(localStorage.getItem("achats")) || [];

  if (currentAchatId) {
    let i = achats.findIndex(x => x.id === currentAchatId);
    achats[i] = { id: currentAchatId, titre, desc, montant, date };
  } else {
    achats.push({
      id: Date.now(),
      titre,
      desc,
      montant,
      date
    });
  }

  localStorage.setItem("achats", JSON.stringify(achats));
  closeAchat();
  loadAchats();
}

function deleteAchat() {
  if (!currentAchatId) return;

  let achats = JSON.parse(localStorage.getItem("achats")) || [];
  achats = achats.filter(x => x.id !== currentAchatId);

  localStorage.setItem("achats", JSON.stringify(achats));
  closeAchat();
  loadAchats();
}

document.addEventListener("DOMContentLoaded", loadAchats);
</script>

</body>
</html>
