<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Achat - Colibri Business</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>

<header>
  <h1>Salle d’Achat</h1>
</header>

<!-- PUB BANNER -->
<div class="pub-banner">
  ESPACE PUBLICITAIRE
</div>

<main id="achatList"></main>

<button class="fab" onclick="window.location.href='vente.html'">
  <i class="fas fa-plus"></i>
</button>

<div id="modalAchat" class="modal">
  <div class="modal-content">
    <h2>Nouvel achat</h2>

    <input type="text" id="nomAchat" placeholder="Produit / Service">
    <input type="number" id="montantAchat" placeholder="Montant">

    <button onclick="saveAchat()">Enregistrer</button>
    <button onclick="closeAchat()">Annuler</button>
  </div>
</div>

<nav class="menu-bas">
  <a href="index.html"><i class="fas fa-home"></i></a>
  <a href="achat.html"><i class="fas fa-cart-shopping"></i></a>
  <a href="commandes.html"><i class="fas fa-box"></i></a>
  <a href="paiements.html"><i class="fas fa-credit-card"></i></a>
  <a href="statistiques.html"><i class="fas fa-chart-line"></i></a>
  <a href="chaines.html"><i class="fas fa-rss"></i></a>
</nav>


<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-app.js";
  import { getFirestore, collection, addDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyA45eoz8QZbHdFlOmuK6l6yjfJC3JaF2jQ",
    authDomain: "collibri-buisiness.firebaseapp.com",
    projectId: "collibri-buisiness",
    storageBucket: "collibri-buisiness.firebasestorage.app",
    messagingSenderId: "812403400254",
    appId: "1:812403400254:web:773de4e308a172d614fb6f",
    measurementId: "G-PMS7V901Y1"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  window.openAddVente = () => modalVente.style.display = "flex";
  window.closeVente = () => modalVente.style.display = "none";

  window.saveVente = async () => {
    const nom = nomProduit.value.trim();
    const prix = prixProduit.value.trim();
    if (!nom || !prix) return alert("Champs requis");

    await addDoc(collection(db, "produits"), {
      nom,
      prix: Number(prix),
      date: new Date()
    });

    nomProduit.value = "";
    prixProduit.value = "";
    closeVente();
  };

  function loadVentes() {
    const q = query(collection(db, "produits"), orderBy("date", "desc"));
    onSnapshot(q, snapshot => {
      venteList.innerHTML = "";
      snapshot.forEach(doc => {
        const v = doc.data();
        const div = document.createElement("div");
        div.className = "client-item";
        div.innerHTML = `<div><strong>${v.nom}</strong><br><small>${v.prix} HTG</small></div>`;
        venteList.appendChild(div);
      });
    });
  }

  loadVentes();
</script>
  

</body>
</html>
