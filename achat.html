<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Achat - Colibri Business</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="style.css">
<link rel="stylesheet"
 href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
.grid {
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:12px;
  padding:12px;
}
.card {
  background:#fff;
  border-radius:14px;
  padding:10px;
  position:relative;
}
.card img {
  width:100%;
  height:150px;
  object-fit:cover;
  border-radius:12px;
}
.price { color:#82CF1B; font-weight:bold }
.heart {
  position:absolute;
  top:10px;
  right:10px;
  font-size:20px;
  cursor:pointer;
}
.heart.red { color:red }
.fab {
  position:fixed;
  bottom:20px;
  right:20px;
  width:60px;height:60px;
  border-radius:50%;
  background:#82CF1B;
  color:white;
  font-size:28px;
  display:flex;
  align-items:center;
  justify-content:center;
}
</style>
</head>

<body>

<header><h1>Marketplace</h1></header>

<main class="grid" id="list"></main>

<div class="fab" onclick="location.href='vente.html'">+</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-app.js";
import { getDatabase, ref, onValue, set, remove }
from "https://www.gstatic.com/firebasejs/12.7.0/firebase-database.js";
import { getAuth, signInAnonymously }
from "https://www.gstatic.com/firebasejs/12.7.0/firebase-auth.js";

const app = initializeApp({
 apiKey:"AIzaSyA45eoz8QZbHdFlOmuK6l6yjfJC3JaF2jQ",
 authDomain:"collibri-buisiness.firebaseapp.com",
 databaseURL:"https://collibri-buisiness-default-rtdb.firebaseio.com",
 projectId:"collibri-buisiness"
});

const auth = getAuth(app);
const db = getDatabase(app);
signInAnonymously(auth);

const list = document.getElementById("list");

onValue(ref(db,"produits"), snap=>{
 list.innerHTML="";
 snap.forEach(p=>{
  const d=p.val();
  const card=document.createElement("div");
  card.className="card";
  card.innerHTML=`
   <span class="heart" id="h-${p.key}" onclick="fav('${p.key}')">🤍</span>
   <img src="${d.image}">
   <div onclick="location.href='produit.html?id=${p.key}'">
    <strong>${d.nom}</strong><br>
    <span class="price">${d.prix} USD</span>
   </div>`;
  list.appendChild(card);
 });
});

window.fav=id=>{
 const uid=auth.currentUser.uid;
 const f=ref(db,`favoris/${uid}/${id}`);
 onValue(f,s=>{
  s.exists()?remove(f):set(f,true);
  document.getElementById("h-"+id).classList.toggle("red");
 },{once:true});
}
</script>

</body>
</html>
