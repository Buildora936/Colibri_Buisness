<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Salle d’Achat</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

<h2>Salle d’Achat</h2>

<input id="search" placeholder="Rechercher">

<div id="achatList"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-app.js";
import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-database.js";

const app = initializeApp({
 apiKey:"AIzaSyA45eoz8QZbHdFlOmuK6l6yjfJC3JaF2jQ",
 databaseURL:"https://collibri-buisiness-default-rtdb.firebaseio.com",
 projectId:"collibri-buisiness"
});

const db = getDatabase(app);
const list=document.getElementById("achatList");
let produits=[];

async function load(){
 const snap=await get(ref(db,"produits"));
 produits=snap.exists()?Object.values(snap.val()):[];
 render();
}

function render(){
 list.innerHTML="";
 produits.forEach(p=>{
   list.innerHTML+=`<p>${p.nom} - ${p.prix} USD</p>`;
 });
}

load();
</script>
</body>
</html>
