<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Ajouter une annonce</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{margin:0;font-family:Arial;background:#e6f0ff}
header{background:#1E3A8A;color:#fff;padding:16px;text-align:center;font-size:20px}
.container{padding:12px}
input,textarea{width:100%;padding:8px;margin-bottom:10px;border-radius:8px;border:1px solid #ccc}
button{padding:10px;border:none;border-radius:10px;background:#1E40AF;color:white;width:100%}
</style>
</head>

<body>

<header>Nouvelle annonce</header>

<div class="container">
 <input id="titre" placeholder="Titre de l'annonce">
 <textarea id="description" placeholder="Description"></textarea>
 <input id="image" placeholder="URL image">
 <input id="video" placeholder="URL vidéo YouTube (embed)">
 <button onclick="publier()">Publier</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-app.js";
import { getDatabase, ref, push, set } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-database.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-auth.js";

const app = initializeApp({
 apiKey:"AIzaSyA45eoz8QZbHdFlOmuK6l6yjfJC3JaF2jQ",
 authDomain:"collibri-buisiness.firebaseapp.com",
 databaseURL:"https://collibri-buisiness-default-rtdb.firebaseio.com",
 projectId:"collibri-buisiness"
});

const db = getDatabase(app);
const auth = getAuth(app);

let currentUser = null;

onAuthStateChanged(auth, user => {
 if(!user){
   location.href = "login.html";
   return;
 }
 currentUser = user.uid;
});

async function publier(){
 if(!currentUser) return;

 await set(push(ref(db,"annonces")),{
   titre: titre.value,
   description: description.value,
   image: image.value,
   video: video.value,
   userId: currentUser,
   createdAt: Date.now()
 });

 location.href = "chaines.html";
}
</script>

</body>
</html>
