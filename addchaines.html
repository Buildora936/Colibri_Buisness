<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Ajouter Annonce - Colibri Business</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
body{margin:0;font-family:Arial;background:#e6f0ff}
header{padding:16px;background:#1E3A8A;color:white;text-align:center;font-size:22px;font-weight:bold}
.container{padding:12px;display:flex;flex-direction:column;gap:12px}
.card{background:white;border-radius:14px;padding:12px;box-shadow:0 2px 6px rgba(0,0,0,0.05)}
.card img{width:100%;border-radius:12px;margin-top:8px}
.card iframe{width:100%;height:180px;border-radius:12px;margin-top:8px}
button{padding:10px 16px;border:none;border-radius:10px;color:white;background:#1E3A8A;cursor:pointer}
button.delete{background:#dc2626}
input,textarea{padding:10px;border-radius:10px;border:1px solid #ccc;width:100%;box-sizing:border-box}
.fab{position:fixed;bottom:80px;right:20px;background:#1E3A8A;color:white;border-radius:50%;width:56px;height:56px;font-size:28px;display:flex;align-items:center;justify-content:center;cursor:pointer}
</style>
</head>
<body>

<header>Gérer vos annonces</header>

<div class="container" id="annonceList"></div>

<div class="card">
  <h3>Nouvelle annonce</h3>
  <textarea id="texteAnnonce" placeholder="Écris ton annonce..."></textarea>
  <input type="text" id="videoAnnonce" placeholder="Lien vidéo YouTube (iframe)">
  <input type="text" id="imageAnnonce" placeholder="Lien image">
  <button id="publierBtn">Publier</button>
</div>

<div class="fab" onclick="location.href='chaines.html'"><i class="fas fa-arrow-left"></i></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-app.js";
import { getDatabase, ref, push, get, remove } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-database.js";

// Firebase
const app = initializeApp({
 apiKey:"AIzaSyA45eoz8QZbHdFlOmuK6l6yjfJC3JaF2jQ",
 authDomain:"collibri-buisiness.firebaseapp.com",
 databaseURL:"https://collibri-buisiness-default-rtdb.firebaseio.com",
 projectId:"collibri-buisiness"
});
const db = getDatabase(app);

const currentUser = "utilisateur1"; // simuler utilisateur connecté
const annonceList = document.getElementById("annonceList");
const publierBtn = document.getElementById("publierBtn");

async function loadAnnonces(){
 annonceList.innerHTML="";
 const snap = await get(ref(db,"chaines"));
 if(!snap.exists()) return;
 Object.entries(snap.val()).forEach(([id,c])=>{
   if(c.user!==currentUser) return; // affichage seulement de ses annonces
   const div = document.createElement("div");
   div.className="card";
   div.innerHTML=`
     <h3>Votre annonce</h3>
     <p>${c.texte}</p>
     ${c.image?`<img src="${c.image}" alt="image">`:``}
     ${c.video?`<iframe src="${c.video}" frameborder="0" allowfullscreen></iframe>`:``}
     <button class="delete" data-id="${id}">Supprimer</button>
   `;
   annonceList.appendChild(div);
   div.querySelector(".delete").onclick = async ()=>{
     await remove(ref(db,`chaines/${id}`));
     loadAnnonces();
   };
 });
}

// Publier annonce
publierBtn.onclick = async ()=>{
 const texte = document.getElementById("texteAnnonce").value.trim();
 const video = document.getElementById("videoAnnonce").value.trim();
 const image = document.getElementById("imageAnnonce").value.trim();
 if(!texte) return alert("Le texte est obligatoire");
 const newRef = push(ref(db,"chaines"));
 await newRef.set({
   texte, video, image, date:new Date().toLocaleString(), user:currentUser
 });
 document.getElementById("texteAnnonce").value="";
 document.getElementById("videoAnnonce").value="";
 document.getElementById("imageAnnonce").value="";
 loadAnnonces();
};

loadAnnonces();
</script>

</body>
</html>
