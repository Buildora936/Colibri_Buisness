<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Mes Favoris - Colibri Business</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<header>
  <i class="fas fa-arrow-left" onclick="history.back()"></i>
  <strong>Mes Favoris</strong>
</header>

<div class="container" id="favList"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-app.js";
import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-database.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-auth.js";

const app = initializeApp({
 apiKey:"AIzaSyA45eoz8QZbHdFlOmuK6l6yjfJC3JaF2jQ",
 authDomain:"collibri-buisiness.firebaseapp.com",
 databaseURL:"https://collibri-buisiness-default-rtdb.firebaseio.com",
 projectId:"collibri-buisiness"
});

const db = getDatabase(app);
const auth = getAuth(app);
const list = document.getElementById("favList");

onAuthStateChanged(auth, async user=>{
  if(!user){ list.innerHTML="<p class='empty'>Connectez-vous</p>"; return; }

  const favSnap = await get(ref(db,"favoris/"+user.uid));
  if(!favSnap.exists()){ list.innerHTML="<p class='empty'>Aucun favori</p>"; return; }

  for(const pid of Object.keys(favSnap.val())){
    const pSnap = await get(ref(db,"produits/"+pid));
    if(!pSnap.exists()) continue;
    const p = pSnap.val();

    const div = document.createElement("div");
    div.className="card";
    div.innerHTML=`
      <img src="${p.image}" onclick="location.href='produit.html?id=${pid}'">
      <h3>${p.nom}</h3>
      <div class="price">${p.prix} USD</div>
    `;
    list.appendChild(div);
  }
});
</script>

</body>
</html>
