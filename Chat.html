<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Discussion</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet"
 href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<style>
body{margin:0;font-family:Arial;background:#e6f0ff;height:100vh;display:flex;flex-direction:column}

/* HEADER */
header{
  background:#1E3A8A;
  color:white;
  padding:12px;
  display:flex;
  align-items:center;
  gap:12px;
}
header img{width:40px;height:40px;border-radius:50%}
header i{font-size:20px;cursor:pointer}

/* MESSAGES */
#messages{
  flex:1;
  padding:12px;
  overflow-y:auto;
  display:flex;
  flex-direction:column;
  gap:8px;
}

.msg{
  max-width:70%;
  padding:10px 12px;
  border-radius:14px;
  font-size:14px;
  box-shadow:0 2px 6px rgba(0,0,0,0.1);
}
.me{
  align-self:flex-end;
  background:#1E40AF;
  color:white;
  border-bottom-right-radius:4px;
}
.other{
  align-self:flex-start;
  background:white;
  color:black;
  border-bottom-left-radius:4px;
}
.time{
  font-size:10px;
  opacity:0.6;
  margin-top:4px;
}

/* INPUT */
footer{
  padding:10px;
  display:flex;
  gap:8px;
  background:#dbeafe;
}
footer input{
  flex:1;
  padding:10px;
  border-radius:20px;
  border:none;
  outline:none;
}
footer button{
  background:#1E3A8A;
  color:white;
  border:none;
  width:44px;
  height:44px;
  border-radius:50%;
  font-size:18px;
  cursor:pointer;
}
footer button:disabled{
  background:#999;
}
</style>
</head>

<body>

<header>
  <i class="fas fa-arrow-left" onclick="history.back()"></i>
  <img id="avatar">
  <strong id="clientName"></strong>
</header>

<div id="messages"></div>

<footer>
  <input id="msgInput" placeholder="Message...">
  <button id="sendBtn" onclick="sendMsg()">
    <i class="fas fa-paper-plane"></i>
  </button>
</footer>

<script>
/* 🔐 Firebase */
firebase.initializeApp({
  apiKey: "TA_CLE",
  authDomain: "TON_DOMAINE",
  databaseURL: "TON_DB_URL",
  projectId: "TON_ID"
});

const auth=firebase.auth();
const db=firebase.database();

let userId, clientId, blocked=false;

/* récupérer id client */
const params=new URLSearchParams(location.search);
clientId=params.get("id");

/* sécurité */
auth.onAuthStateChanged(user=>{
  if(!user) return location.href="login.html";
  userId=user.uid;
  loadClient();
  loadMessages();
});

/* charger infos client */
function loadClient(){
  db.ref(`clients/${userId}/${clientId}`).once("value",snap=>{
    if(!snap.exists()) return;
    const c=snap.val();
    blocked=!!c.blocked;
    document.getElementById("clientName").textContent=c.nom;
    document.getElementById("avatar").src=c.avatar||"https://via.placeholder.com/40";
    document.getElementById("sendBtn").disabled=blocked;
    document.getElementById("msgInput").disabled=blocked;
    if(blocked) document.getElementById("msgInput").placeholder="Contact bloqué";
  });
}

/* charger messages */
function loadMessages(){
  const box=document.getElementById("messages");
  db.ref(`chats/${userId}/${clientId}/messages`)
    .on("child_added",snap=>{
      const m=snap.val();
      const div=document.createElement("div");
      div.className="msg "+(m.sender===userId?"me":"other");
      div.innerHTML=`
        ${m.text}
        <div class="time">${new Date(m.time).toLocaleTimeString()}</div>
      `;
      box.appendChild(div);
      box.scrollTop=box.scrollHeight;
    });
}

/* envoyer message */
function sendMsg(){
  const input=document.getElementById("msgInput");
  if(!input.value.trim()) return;
  db.ref(`chats/${userId}/${clientId}/messages`).push({
    text:input.value,
    sender:userId,
    time:Date.now()
  });
  input.value="";
}
</script>

</body>
</html>
