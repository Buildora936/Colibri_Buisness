<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Messagerie - Colibri Business</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
body { margin:0; font-family: Arial; background:#e6f0ff; display:flex; flex-direction:column; height:100vh; }
header { background:#1E3A8A; color:white; padding:16px; font-size:20px; font-weight:bold; text-align:center; position:sticky; top:0; z-index:10; }
#chatContainer { flex:1; overflow-y:auto; padding:12px; display:flex; flex-direction:column; gap:8px; }
.message { max-width:70%; padding:10px 14px; border-radius:12px; }
.sent { align-self:flex-end; background:#1E40AF; color:white; border-bottom-right-radius:0; }
.received { align-self:flex-start; background:white; color:#1E3A8A; border-bottom-left-radius:0; border:1px solid #ccc; }
#messageForm { display:flex; padding:12px; background:white; border-top:1px solid #ccc; gap:8px; }
#messageInput { flex:1; padding:10px; border-radius:20px; border:1px solid #ccc; }
#sendBtn { background:#1E3A8A; color:white; border:none; padding:0 16px; border-radius:20px; cursor:pointer; font-weight:bold; }
.menu-bas { position:fixed; bottom:0; width:100%; background:#1E40AF; display:flex; justify-content:space-around; padding:10px 0; }
.menu-bas a { color:white; font-size:20px; text-decoration:none; }
</style>
</head>

<body>

<header>Messagerie</header>

<div id="chatContainer"></div>

<form id="messageForm">
  <input type="text" id="messageInput" placeholder="Écrire un message...">
  <button type="submit" id="sendBtn">Envoyer</button>
</form>

<nav class="menu-bas">
  <a href="index.html"><i class="fas fa-home"></i></a>
  <a href="achat.html"><i class="fas fa-cart-shopping"></i></a>
  <a href="commandes.html"><i class="fas fa-box"></i></a>
  <a href="paiements.html"><i class="fas fa-credit-card"></i></a>
  <a href="statistiques.html"><i class="fas fa-chart-line"></i></a>
  <a href="chaines.html"><i class="fas fa-rss"></i></a>
</nav>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-app.js";
import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-database.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-auth.js";

// Firebase config
const app = initializeApp({
 apiKey:"AIzaSyA45eoz8QZbHdFlOmuK6l6yjfJC3JaF2jQ",
 authDomain:"collibri-buisiness.firebaseapp.com",
 databaseURL:"https://collibri-buisiness-default-rtdb.firebaseio.com",
 projectId:"collibri-buisiness"
});
const db = getDatabase(app);
const auth = getAuth(app);

let currentUser = null;
const chatContainer = document.getElementById("chatContainer");
const messageInput = document.getElementById("messageInput");
const messageForm = document.getElementById("messageForm");

// Vérifier l'utilisateur connecté
onAuthStateChanged(auth, user => {
  if(!user){
    window.location.href="login.html";
  } else {
    currentUser = user.uid;
    loadMessages();
  }
});

// Charger les messages
function loadMessages(){
  const chatRef = ref(db, "messages");
  onValue(chatRef, snapshot=>{
    chatContainer.innerHTML = "";
    if(!snapshot.exists()) return;
    Object.values(snapshot.val()).forEach(msg=>{
      const div = document.createElement("div");
      div.className = "message " + (msg.uid === currentUser ? "sent" : "received");
      div.textContent = msg.text;
      chatContainer.appendChild(div);
    });
    chatContainer.scrollTop = chatContainer.scrollHeight;
  });
}

// Envoyer message
messageForm.addEventListener("submit", async e=>{
  e.preventDefault();
  const text = messageInput.value.trim();
  if(!text) return;
  const chatRef = ref(db, "messages");
  await push(chatRef, { uid: currentUser, text, date: Date.now() });
  messageInput.value="";
});
</script>

</body>
</html>
