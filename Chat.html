<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Chat - Colibri Business</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
body{margin:0;font-family:Arial;background:#e6f0ff}
header{display:flex;align-items:center;padding:12px;background:#1E3A8A;color:white;font-size:20px;font-weight:bold}
header i{margin-right:16px;cursor:pointer}
.chat-container{display:flex;flex-direction:column;height:calc(100vh-56px);padding:12px;overflow-y:auto}
.chat-msg{max-width:70%;margin-bottom:12px;padding:10px;border-radius:12px;position:relative;word-break:break-word}
.sent{background:#1E3A8A;color:white;margin-left:auto}
.received{background:#ccc;margin-right:auto;color:black}
small{font-size:10px;opacity:0.7;display:block;margin-top:4px}
.favorite{position:absolute;top:4px;right:4px;color:white;cursor:pointer}
.favorite.red{color:red}
.delete-msg{position:absolute;top:4px;right:24px;color:white;cursor:pointer;font-size:12px}
.chat-input{display:flex;padding:10px;background:white;position:fixed;bottom:0;width:100%}
.chat-input input[type="text"]{flex:1;padding:10px;border-radius:20px;border:1px solid #ccc;margin-right:8px}
.chat-input input[type="file"]{display:none}
.chat-input label{margin-right:8px;background:#1E3A8A;color:white;padding:10px 14px;border-radius:50%;cursor:pointer}
.chat-input button{background:#1E3A8A;color:white;border:none;padding:10px 16px;border-radius:50%;cursor:pointer}
img,video{max-width:200px;border-radius:8px;margin-top:4px}
.notification{position:fixed;top:56px;right:20px;background:red;color:white;padding:6px 12px;border-radius:20px;display:none}
</style>
</head>
<body>

<header>
  <i class="fas fa-arrow-left" onclick="goBack()"></i>
  Discussion Client
</header>

<div class="chat-container" id="chatBox"></div>

<div class="notification" id="notif">Nouveau message !</div>

<div class="chat-input">
  <label for="fileInput"><i class="fas fa-paperclip"></i></label>
  <input type="file" id="fileInput" accept="image/*,video/*">
  <input type="text" id="messageInput" placeholder="Écrire un message...">
  <button onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-app.js";
import { getDatabase, ref, push, onValue, remove, update } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-database.js";

// Firebase
const app = initializeApp({
  apiKey:"AIzaSyA45eoz8QZbHdFlOmuK6l6yjfJC3JaF2jQ",
  authDomain:"collibri-buisiness.firebaseapp.com",
  databaseURL:"https://collibri-buisiness-default-rtdb.firebaseio.com",
  projectId:"collibri-buisiness"
});
const db = getDatabase(app);
const chatRef = ref(db,"messages");

const chatBox = document.getElementById("chatBox");
const messageInput = document.getElementById("messageInput");
const fileInput = document.getElementById("fileInput");
const notif = document.getElementById("notif");

function goBack(){window.history.back()}

// Envoi message texte ou fichier
function sendMessage(fileData=null){
  let text = messageInput.value.trim();
  if(!text && !fileData) return;

  const msg = {
    text: text || "",
    file:fileData || null, // {url,type}
    type:"sent",
    timestamp:Date.now(),
    favorite:false,
    seen:false,
    userId:"vendeur1"
  };
  push(chatRef,msg);
  messageInput.value="";
}

// Gestion upload fichier
fileInput.addEventListener("change", ()=>{
  const file = fileInput.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = ()=>sendMessage({url:reader.result,type:file.type});
  reader.readAsDataURL(file);
  fileInput.value="";
});

// Toggle favoris
function toggleFavorite(id,current){
  const favRef = ref(db,"messages/"+id);
  update(favRef,{favorite:!current});
}

// Supprimer message
function deleteMessage(id,msgUserId){
  if(msgUserId!=="vendeur1") return alert("Vous ne pouvez supprimer que vos messages");
  const msgRef = ref(db,"messages/"+id);
  remove(msgRef);
}

// Chargement messages en temps réel
let firstLoad = true;
onValue(chatRef,(snapshot)=>{
  chatBox.innerHTML="";
  const data = snapshot.val();
  if(!data) return;

  Object.entries(data).forEach(([id,msg])=>{
    const div = document.createElement("div");
    div.className="chat-msg "+msg.type;

    let content = msg.text;
    if(msg.file){
      if(msg.file.type.startsWith("image/")){
        content += `<br><img src="${msg.file.url}" alt="image">`;
      }else if(msg.file.type.startsWith("video/")){
        content += `<br><video src="${msg.file.url}" controls></video>`;
      }
    }

    div.innerHTML=content+
      `<small>${new Date(msg.timestamp).toLocaleTimeString()}</small>
      <i class="fas fa-heart favorite ${msg.favorite?"red":""}" onclick="toggleFavorite('${id}',${msg.favorite})"></i>
      <i class="fas fa-trash delete-msg" onclick="deleteMessage('${id}','${msg.userId}')"></i>`;

    chatBox.appendChild(div);
  });

  chatBox.scrollTop = chatBox.scrollHeight;

  // Notification
  if(!firstLoad){
    notif.style.display="block";
    setTimeout(()=>{notif.style.display="none"},2000);
  }
  firstLoad=false;
});

</script>
</body>
</html>
