<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Discussion</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
body{margin:0;font-family:Arial;background:#e6f0ff;display:flex;flex-direction:column;height:100vh}
header{padding:16px;background:#1E3A8A;color:white;text-align:center;font-size:22px;font-weight:bold}
#messages{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:8px}
.message{padding:10px;border-radius:12px;max-width:70%;word-wrap:break-word}
.sent{background:#1E3A8A;color:white;align-self:flex-end}
.received{background:white;color:black;align-self:flex-start}
#inputArea{display:flex;gap:8px;padding:12px;background:#f0f0f0}
#inputArea input{flex:1;padding:10px;border-radius:10px;border:1px solid #ccc}
#inputArea button{padding:10px;border:none;border-radius:10px;background:#1E3A8A;color:white;cursor:pointer}
</style>
</head>
<body>

<header id="chatHeader">Discussion</header>
<div id="messages"></div>

<div id="inputArea">
  <input type="text" id="msgInput" placeholder="Écrire un message...">
  <button onclick="sendMessage()">Envoyer</button>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "TON_API_KEY",
  authDomain: "TON_PROJET.firebaseapp.com",
  projectId: "TON_PROJET",
  storageBucket: "TON_PROJET.appspot.com",
  messagingSenderId: "TON_SENDER_ID",
  appId: "TON_APP_ID"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const urlParams = new URLSearchParams(window.location.search);
const clientId = urlParams.get('id');
const messagesDiv = document.getElementById("messages");
const msgInput = document.getElementById("msgInput");

let clientName = "";

db.collection("clients").doc(clientId).get().then(doc=>{
  if(doc.exists){
    clientName = doc.data().nom;
    document.getElementById("chatHeader").textContent = "Discussion avec "+clientName;
  }
});

function renderMessages(snapshot){
  messagesDiv.innerHTML = "";
  snapshot.forEach(doc=>{
    const m = doc.data();
    const div = document.createElement("div");
    div.className = "message "+(m.sender==="me"?"sent":"received");
    div.textContent = m.text;
    messagesDiv.appendChild(div);
  });
  messagesDiv.scrollTop = messagesDiv.scrollHeight;
}

db.collection("chats").doc(clientId).collection("messages").orderBy("time")
.onSnapshot(renderMessages);

function sendMessage(){
  const text = msgInput.value.trim();
  if(!text) return;
  db.collection("chats").doc(clientId).collection("messages").add({
    text,
    sender:"me",
    time:firebase.firestore.FieldValue.serverTimestamp()
  });
  msgInput.value="";
}
</script>
</body>
</html>
