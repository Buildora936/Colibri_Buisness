<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Mon espace vendeur</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{margin:0;font-family:Arial;background:#e6f0ff}
header{background:#1E3A8A;color:#fff;padding:16px;text-align:center;font-size:20px}
.container{padding:12px}
.card{background:#fff;border-radius:12px;padding:12px;margin-bottom:12px}
button{padding:8px 12px;border:none;border-radius:8px;background:#1E40AF;color:white}
</style>
</head>

<body>

<header>Mon espace vendeur</header>

<div class="container" id="produitsVendeur"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-app.js";
import { getDatabase, ref, get, remove } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-database.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-auth.js";

const app = initializeApp({
 apiKey:"AIzaSyA45eoz8QZbHdFlOmuK6l6yjfJC3JaF2jQ",
 authDomain:"collibri-buisiness.firebaseapp.com",
 databaseURL:"https://collibri-buisiness-default-rtdb.firebaseio.com",
 projectId:"collibri-buisiness"
});

const db = getDatabase(app);
const auth = getAuth(app);
const container = document.getElementById("produitsVendeur");

let vendeurId = null;

onAuthStateChanged(auth, async user => {
 if(!user){
   location.href = "login.html";
   return;
 }
 vendeurId = user.uid;
 chargerProduits();
});

async function chargerProduits(){
 container.innerHTML = "";
 const snap = await get(ref(db,"produits"));
 if(!snap.exists()) return;

 Object.entries(snap.val()).forEach(([id, data])=>{
   if(data.vendeurId !== vendeurId) return;

   const div = document.createElement("div");
   div.className = "card";
   div.innerHTML = `
     <h3>${data.nom}</h3>
     <p>${data.prix} USD</p>
     <button>Supprimer</button>
   `;
   div.querySelector("button").onclick = () => {
     remove(ref(db,"produits/"+id)).then(chargerProduits);
   };
   container.appendChild(div);
 });
}
</script>

</body>
</html>
