<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Ajouter Client - Colibri Business</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
body{margin:0;font-family:Arial;background:#e6f0ff}
header{padding:16px;background:#1E3A8A;color:white;text-align:center;font-size:22px;font-weight:bold}
main{padding:12px}
form{background:white;padding:16px;margin:12px;border-radius:12px;display:flex;flex-direction:column;gap:12px;box-shadow:0 2px 6px rgba(0,0,0,0.05)}
form input{padding:10px;border-radius:10px;border:1px solid #ccc}
form button{padding:10px;border:none;border-radius:10px;font-weight:bold;cursor:pointer;background:#1E3A8A;color:white}
</style>
</head>

<body>

<header>Ajouter Client</header>

<main>
<form id="addClientForm">
  <input type="text" id="nom" placeholder="Nom" required>
  <input type="text" id="tel" placeholder="Téléphone" required>
  <input type="file" id="avatar" accept="image/*">
  <button type="submit">Ajouter</button>
</form>
</main>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-app.js";
import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-database.js";
import { getStorage, ref as sRef, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-storage.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-auth.js";

const firebaseConfig = {
 apiKey:"AIzaSyA45eoz8QZbHdFlOmuK6l6yjfJC3JaF2jQ",
 authDomain:"collibri-buisiness.firebaseapp.com",
 databaseURL:"https://collibri-buisiness-default-rtdb.firebaseio.com",
 projectId:"collibri-buisiness",
 storageBucket:"collibri-buisiness.appspot.com"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const storage = getStorage(app);
const auth = getAuth();

let currentUser = null;

onAuthStateChanged(auth,user=>{
  if(!user) window.location.href="login.html";
  else currentUser=user.uid;
});

const form = document.getElementById("addClientForm");
form.addEventListener("submit", async e=>{
  e.preventDefault();
  if(!currentUser) return;

  const nom = document.getElementById("nom").value.trim();
  const tel = document.getElementById("tel").value.trim();
  const file = document.getElementById("avatar").files[0];
  let avatarUrl = "";

  if(file){
    const storageRef = sRef(storage, `avatars/${currentUser}/${Date.now()}_${file.name}`);
    await uploadBytes(storageRef, file);
    avatarUrl = await getDownloadURL(storageRef);
  }

  await push(ref(db, `clients/${currentUser}`), {
    nom, tel, avatar: avatarUrl || "", blocked: false
  });

  alert("Client ajouté !");
  window.location.href="index.html";
});
</script>

</body>
</html>
