<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Ajouter un client - Colibri Business</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
body{margin:0;font-family:Arial;background:#e6f0ff;padding:16px}
h2{color:#1E3A8A;text-align:center;margin-bottom:20px}
input{width:100%;padding:10px;margin-bottom:12px;border-radius:10px;border:1px solid #ccc;box-sizing:border-box}
button{background:#1E3A8A;color:white;padding:10px;border:none;border-radius:10px;width:100%;font-weight:bold;cursor:pointer}
</style>
</head>

<body>

<h2>Ajouter un client</h2>

<input type="text" id="nomClient" placeholder="Nom">
<input type="text" id="telClient" placeholder="Téléphone">
<input type="url" id="avatarClient" placeholder="Lien avatar (facultatif)">

<button onclick="addClient()">Ajouter</button>

<script>
function addClient(){
  const nom = document.getElementById("nomClient").value.trim();
  const tel = document.getElementById("telClient").value.trim();
  const avatar = document.getElementById("avatarClient").value.trim();

  if(!nom || !tel){
    alert("Nom et téléphone obligatoires");
    return;
  }

  const clients = JSON.parse(localStorage.getItem("clients")) || [];
  const id = Date.now().toString();

  clients.push({id, nom, tel, avatar, blocked:false});
  localStorage.setItem("clients", JSON.stringify(clients));
  alert("Client ajouté !");
  window.location.href = "index.html";
}
</script>

</body>
</html>
