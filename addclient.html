<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Ajouter Client</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet"
 href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
body{margin:0;font-family:Arial;background:#e6f0ff;display:flex;flex-direction:column;height:100vh}
header{background:#1E3A8A;color:white;padding:16px;text-align:center;font-size:22px;font-weight:bold}
main{flex:1;padding:20px}
input{width:100%;padding:12px;margin-bottom:12px;border-radius:10px;border:1px solid #ccc;font-size:16px;outline:none}
button{width:100%;padding:12px;background:#1E3A8A;color:white;font-size:16px;font-weight:bold;border:none;border-radius:10px;cursor:pointer}
button:disabled{background:#999}
#avatarPreview{display:block;margin:0 auto 12px;width:80px;height:80px;border-radius:50%;object-fit:cover;background:#fff}
</style>
</head>

<body>

<header>Ajouter Client</header>

<main>
  <input type="text" id="nom" placeholder="Nom">
  <input type="text" id="tel" placeholder="Téléphone">
  
  <input type="file" id="avatar" accept="image/*" onchange="previewAvatar(event)">
  <img id="avatarPreview" src="https://via.placeholder.com/80" alt="Avatar">

  <button onclick="addClient()">Ajouter</button>
</main>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-app.js";
import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-database.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-auth.js";

const firebaseConfig = {
 apiKey:"AIzaSyA45eoz8QZbHdFlOmuK6l6yjfJC3JaF2jQ",
 authDomain:"collibri-buisiness.firebaseapp.com",
 databaseURL:"https://collibri-buisiness-default-rtdb.firebaseio.com",
 projectId:"collibri-buisiness"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const auth = getAuth();

let currentUser = null;
onAuthStateChanged(auth, user => {
  if(!user){
    window.location.href="login.html";
  } else {
    currentUser = user.uid;
  }
});

function previewAvatar(event){
  const preview=document.getElementById("avatarPreview");
  preview.src=URL.createObjectURL(event.target.files[0]);
}

async function addClient(){
  if(!currentUser) return alert("Utilisateur non connecté");

  const nom=document.getElementById("nom").value.trim();
  const tel=document.getElementById("tel").value.trim();
  const avatar=document.getElementById("avatarPreview").src;

  if(!nom||!tel) return alert("Remplissez tous les champs !");

  await push(ref(db,"clients/"+currentUser),{
    nom,
    tel,
    avatar,
    blocked:false
  });

  alert("Client ajouté !");
  window.location.href="index.html";
}
</script>

</body>
</html>
