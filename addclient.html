<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Ajouter Client</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
body{margin:0;font-family:Arial;background:#e6f0ff}
header{padding:16px;background:#1E3A8A;color:white;text-align:center;font-size:22px;font-weight:bold}
main{padding:12px;display:flex;flex-direction:column;gap:12px}
input{padding:12px;border-radius:10px;border:1px solid #ccc;width:100%}
button{padding:12px;border:none;border-radius:10px;background:#1E3A8A;color:white;font-weight:bold;cursor:pointer}
</style>
</head>
<body>

<header>Ajouter Client</header>
<main>
<input type="text" id="nom" placeholder="Nom">
<input type="text" id="tel" placeholder="Téléphone">
<input type="text" id="avatar" placeholder="URL Avatar (optionnel)">
<button onclick="addClient()">Ajouter</button>
</main>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "TON_API_KEY",
  authDomain: "TON_PROJET.firebaseapp.com",
  projectId: "TON_PROJET",
  storageBucket: "TON_PROJET.appspot.com",
  messagingSenderId: "TON_SENDER_ID",
  appId: "TON_APP_ID"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

function addClient(){
  const nom = document.getElementById("nom").value.trim();
  const tel = document.getElementById("tel").value.trim();
  const avatar = document.getElementById("avatar").value.trim();

  if(!nom||!tel){ alert("Nom et téléphone sont requis"); return; }

  db.collection("clients").add({nom,tel,avatar,blocked:false}).then(()=>{
    alert("Client ajouté !");
    window.location.href="index.html";
  });
}
</script>
</body>
</html>
