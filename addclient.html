<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Ajouter client</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>

<header>
  <h1>Ajouter client</h1>
</header>

<main>
  <div class="card">
    <label>Nom du client</label>
    <input id="nom" placeholder="Nom complet">

    <label>Téléphone</label>
    <input id="tel" placeholder="+509...">

    <button class="btn-primary" onclick="saveClient()">Enregistrer</button>
  </div>
</main>

<button class="fab" onclick="goBack()">
  <i class="fas fa-arrow-left"></i>
</button>

<nav class="menu-bas">
  <a href="achat.html"><i class="fas fa-cart-shopping"></i></a>
  <a href="commandes.html"><i class="fas fa-box"></i></a>
  <a href="paiements.html"><i class="fas fa-credit-card"></i></a>
  <a href="statistiques.html"><i class="fas fa-chart-line"></i></a>
  <a href="chaines.html"><i class="fas fa-rss"></i></a>
</nav>

<script>
function saveClient() {
  const nom = document.getElementById("nom").value.trim();
  const tel = document.getElementById("tel").value.trim();

  if (!nom || !tel) {
    alert("Champs requis");
    return;
  }

  let clients = JSON.parse(localStorage.getItem("clients")) || [];

  clients.push({
    id: Date.now(),
    nom,
    tel
  });

  localStorage.setItem("clients", JSON.stringify(clients));
  window.location.href = "index.html";
}

function goBack() {
  window.location.href = "index.html";
}
</script>

</body>
</html>
