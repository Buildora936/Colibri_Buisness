<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Profil vendeur - Colibri Business</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
</head>

<body>

<h2>Profil Professionnel</h2>
<p>Complète ton profil pour commencer à vendre</p>

<input id="vendeurNom" type="text" placeholder="Nom du vendeur / business">
<input id="vendeurLogo" type="url" placeholder="Lien du logo (image URL)">

<button onclick="saveProfil()">Enregistrer</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-auth.js";
import { getDatabase, ref, update, get } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyA45eoz8QZbHdFlOmuK6l6yjfJC3JaF2jQ",
  authDomain: "collibri-buisiness.firebaseapp.com",
  databaseURL: "https://collibri-buisiness-default-rtdb.firebaseio.com",
  projectId: "collibri-buisiness",
  appId: "1:812403400254:web:773de4e308a172d614fb6f"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth();
const db = getDatabase();

onAuthStateChanged(auth, user => {
  if (!user) {
    window.location.href = "login.html";
  } else {
    get(ref(db, "users/" + user.uid)).then(snapshot => {
      const data = snapshot.val();
      if (data.type !== "professionnel") {
        window.location.href = "achat.html";
      }
    });
  }
});

window.saveProfil = function () {
  const nom = document.getElementById("vendeurNom").value;
  const logo = document.getElementById("vendeurLogo").value;

  if (!nom || !logo) {
    alert("Nom et logo obligatoires");
    return;
  }

  const uid = auth.currentUser.uid;

  update(ref(db, "users/" + uid), {
    vendeurNom: nom,
    vendeurLogo: logo
  }).then(() => {
    alert("Profil vendeur enregistré");
    window.location.href = "vente.html";
  });
};
</script>

</body>
</html>
