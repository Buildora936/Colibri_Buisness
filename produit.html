<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Produit - Colibri Business</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
body{margin:0;font-family:Arial;background:#e6f0ff}
header{padding:14px;background:#1E3A8A;color:white;display:flex;align-items:center;gap:12px}
header i{font-size:20px;cursor:pointer}
.container{padding:12px}
.card{background:white;border-radius:14px;padding:12px;box-shadow:0 2px 6px rgba(0,0,0,.05)}
h2{margin:6px 0;color:#1E3A8A}
.price{color:#1E40AF;font-weight:bold;margin:6px 0}
img{width:100%;border-radius:12px}
iframe{width:100%;height:200px;border-radius:12px;margin-top:8px}
.heart{font-size:26px;cursor:pointer;float:right}
.heart.red{color:red}
.vendor{display:flex;align-items:center;gap:8px;margin-top:10px}
.vendor img{width:40px;height:40px;border-radius:50%}
hr{border:none;border-top:1px solid #ddd;margin:12px 0}
textarea,input{width:100%;padding:10px;border-radius:10px;border:1px solid #ccc}
button{background:#1E3A8A;color:white;border:none;border-radius:10px;padding:10px;margin-top:8px;font-weight:bold}
.comment{background:#f1f5ff;border-radius:10px;padding:8px;margin-top:8px}
small{opacity:.7}
</style>
</head>

<body>

<header>
  <i class="fas fa-arrow-left" onclick="history.back()"></i>
  <strong>Produit</strong>
</header>

<div class="container">
  <div class="card" id="productCard">Chargement...</div>

  <hr>

  <h3>Avis & Commentaires</h3>
  <textarea id="avisTexte" placeholder="Écrire un commentaire..."></textarea>
  <button onclick="publierAvis()">Publier</button>

  <div id="avisList"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-app.js";
import { getDatabase, ref, get, set, push, remove, onValue } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-database.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-auth.js";

const app = initializeApp({
 apiKey:"AIzaSyA45eoz8QZbHdFlOmuK6l6yjfJC3JaF2jQ",
 authDomain:"collibri-buisiness.firebaseapp.com",
 databaseURL:"https://collibri-buisiness-default-rtdb.firebaseio.com",
 projectId:"collibri-buisiness"
});

const db = getDatabase(app);
const auth = getAuth(app);

const params = new URLSearchParams(location.search);
const produitId = params.get("id");

let currentUser = null;

onAuthStateChanged(auth,u=> currentUser=u ? u.uid : null);

async function loadProduit(){
 const snap = await get(ref(db,"produits/"+produitId));
 if(!snap.exists()) return;
 const p = snap.val();

 let vendeurHTML = "";
 const vendeurSnap = await get(ref(db,"users/"+p.vendeurId));
 if(vendeurSnap.exists()){
   const v = vendeurSnap.val();
   if(v.vendeurNom && v.vendeurLogo){
     vendeurHTML = `
       <div class="vendor">
         <img src="${v.vendeurLogo}">
         <strong>${v.vendeurNom}</strong>
       </div>`;
   }
 }

 document.getElementById("productCard").innerHTML = `
   <span class="heart" id="fav">🤍</span>
   <img src="${p.image}">
   <h2>${p.nom}</h2>
   <div class="price">${p.prix} USD</div>
   <p>${p.description}</p>
   ${vendeurHTML}
   <iframe src="${p.video}" allowfullscreen></iframe>
 `;

 // Favori
 if(currentUser){
   const favRef = ref(db,`favoris/${currentUser}/${produitId}`);
   const favSnap = await get(favRef);
   if(favSnap.exists()) document.getElementById("fav").classList.add("red");
   document.getElementById("fav").onclick = async ()=>{
     const s = await get(favRef);
     s.exists()?remove(favRef):set(favRef,true);
     document.getElementById("fav").classList.toggle("red");
   };
 }
}

function loadAvis(){
 onValue(ref(db,"avis/"+produitId), snap=>{
   const list = document.getElementById("avisList");
   list.innerHTML="";
   if(!snap.exists()) return;
   Object.values(snap.val()).reverse().forEach(a=>{
     const d = new Date(a.date).toLocaleString();
     list.innerHTML += `
       <div class="comment">
         <small>${d}</small>
         <div>${a.texte}</div>
       </div>`;
   });
 });
}

async function publierAvis(){
 if(!currentUser){ alert("Connectez-vous"); return; }
 const texte = avisTexte.value.trim();
 if(!texte) return;

 await push(ref(db,"avis/"+produitId),{
   uid: currentUser,
   texte,
   date: Date.now()
 });
 avisTexte.value="";
}

loadProduit();
loadAvis();
</script>

</body>
</html>
