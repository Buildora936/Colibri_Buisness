<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Produit - Colibri Business</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet"
 href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
body { margin:0; font-family:Arial }
header { padding:12px; background:#82CF1B; color:white }
.container { padding:16px }
img { width:100%; border-radius:16px }
.price { color:#82CF1B; font-size:22px; font-weight:bold }
.heart { font-size:26px; cursor:pointer }
.heart.red { color:red }
.delete {
 background:#ff5252; color:white;
 border:none; padding:12px;
 width:100%; border-radius:10px;
 margin-top:16px;
}
iframe {
 width:100%; height:220px;
 border-radius:14px;
 margin-top:12px;
}
</style>
</head>

<body>

<header>
  <h2>Détail du produit</h2>
</header>

<div class="container">
  <span id="fav" class="heart">🤍</span>

  <img id="image">
  <h2 id="nom"></h2>
  <div class="price" id="prix"></div>

  <p id="description"></p>

  <iframe id="video" allowfullscreen></iframe>

  <button id="deleteBtn" class="delete" style="display:none">
    Supprimer ce produit
  </button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-app.js";
import { getDatabase, ref, get, remove, set }
from "https://www.gstatic.com/firebasejs/12.7.0/firebase-database.js";
import { getAuth, signInAnonymously }
from "https://www.gstatic.com/firebasejs/12.7.0/firebase-auth.js";

const app = initializeApp({
 apiKey:"AIzaSyA45eoz8QZbHdFlOmuK6l6yjfJC3JaF2jQ",
 authDomain:"collibri-buisiness.firebaseapp.com",
 databaseURL:"https://collibri-buisiness-default-rtdb.firebaseio.com",
 projectId:"collibri-buisiness"
});

const auth = getAuth(app);
const db = getDatabase(app);
await signInAnonymously(auth);

const uid = auth.currentUser.uid;
const id = new URLSearchParams(location.search).get("id");

const prodRef = ref(db,"produits/"+id);
const favRef = ref(db,`favoris/${uid}/${id}`);

const snap = await get(prodRef);
if(!snap.exists()) alert("Produit introuvable");

const d = snap.val();

image.src = d.image;
nom.textContent = d.nom;
prix.textContent = d.prix + " USD";
description.textContent = d.description;
video.src = d.video.replace("watch?v=","embed/");

// sécurité suppression
if(d.vendeurId === uid) {
 deleteBtn.style.display="block";
 deleteBtn.onclick=()=>{
  if(confirm("Supprimer ce produit ?")){
    remove(prodRef);
    location.href="achat.html";
  }
 }
}

// favori toggle
const favIcon=document.getElementById("fav");
const favSnap = await get(favRef);
if(favSnap.exists()) favIcon.classList.add("red");

favIcon.onclick=async()=>{
 const s=await get(favRef);
 s.exists()?remove(favRef):set(favRef,true);
 favIcon.classList.toggle("red");
};
</script>

</body>
</html>
