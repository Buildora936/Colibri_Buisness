<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Paiements - Colibri Business</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<header>
  <h1>Paiements</h1>
</header>

<main id="paiementList"></main>

<nav class="menu-bas">
  <a href="index.html"><i class="fas fa-home"></i></a>
  <a href="achat.html"><i class="fas fa-cart-shopping"></i></a>
  <a href="commandes.html"><i class="fas fa-box"></i></a>
  <a href="paiements.html"><i class="fas fa-credit-card"></i></a>
  <a href="statistiques.html"><i class="fas fa-chart-line"></i></a>
  <a href="chaines.html"><i class="fas fa-rss"></i></a>
</nav>

<script>
function loadPaiements() {
  const list = document.getElementById("paiementList");
  list.innerHTML = "";
  let paiements = JSON.parse(localStorage.getItem("paiements")) || [];
  if (paiements.length === 0) {
    list.innerHTML = "<p style='text-align:center;margin-top:20px;'>Aucun paiement</p>";
    return;
  }
  paiements.forEach(p => {
    const div = document.createElement("div");
    div.className = "paiement-item";
    div.innerHTML = `
      <strong>${p.nomClient}</strong><br>
      <small>Montant: ${p.montant} HTG - Date: ${p.date}</small>
    `;
    list.appendChild(div);
  });
}

document.addEventListener("DOMContentLoaded", loadPaiements);
</script>

</body>
</html>
