<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Paiements - Colibri Business</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
body{margin:0;font-family:Arial;background:#e6f0ff}
header{padding:16px;background:#1E3A8A;color:white;text-align:center;font-size:22px;font-weight:bold}
.container{padding:12px}
.card{background:white;border-radius:14px;padding:12px;margin-bottom:12px;box-shadow:0 2px 6px rgba(0,0,0,0.05)}
.card h3{margin:0;color:#1E3A8A}
.card .price{font-weight:bold;color:#1E40AF;margin-top:4px}
.card button{padding:10px;border:none;border-radius:10px;font-weight:bold;cursor:pointer;background:#1E3A8A;color:white;margin-top:8px;width:100%}
.empty{text-align:center;opacity:0.6;margin-top:40px}
.menu-bas{position:fixed;bottom:0;width:100%;background:#1E40AF;display:flex;justify-content:space-around;padding:10px 0}
.menu-bas a{color:white;font-size:20px;text-decoration:none}
</style>
</head>

<body>

<header>Paiements</header>

<div class="container" id="paiementList"></div>

<nav class="menu-bas">
 <a href="index.html"><i class="fas fa-home"></i></a>
 <a href="achat.html"><i class="fas fa-cart-shopping"></i></a>
 <a href="commandes.html"><i class="fas fa-box"></i></a>
 <a href="paiements.html"><i class="fas fa-credit-card"></i></a>
 <a href="statistiques.html"><i class="fas fa-chart-line"></i></a>
 <a href="chaines.html"><i class="fas fa-rss"></i></a>
</nav>

<script>
const paiementList = document.getElementById("paiementList");

// exemple de données
let paiements = JSON.parse(localStorage.getItem("paiements")) || [];

function renderPaiements(){
  paiementList.innerHTML = "";
  if(paiements.length===0){
    paiementList.innerHTML = "<p class='empty'>Aucun paiement</p>";
    return;
  }

  paiements.forEach(p=>{
    const div = document.createElement("div");
    div.className = "card";
    div.innerHTML = `
      <h3>${p.nom}</h3>
      <div class="price">${p.montant} USD</div>
      <div>Date : ${p.date}</div>
      <button onclick="payer('${p.id}')">Payer</button>
    `;
    paiementList.appendChild(div);
  });
}

function payer(id){
  alert("Paiement effectué pour l'ID : "+id);
  // ici tu peux ajouter intégration Stripe ou PayPal
}

document.addEventListener("DOMContentLoaded", renderPaiements);
</script>

</body>
</html>
