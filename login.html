<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Connexion - Colibri Business</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
</head>
<body>

<h2>Connexion</h2>

<input id="email" type="email" placeholder="Email">
<input id="password" type="password" placeholder="Mot de passe">
<button onclick="login()">Se connecter</button>
<p>Pas de compte ? <a href="signup.html">S’inscrire</a></p>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-auth.js";
import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-database.js";

const firebaseConfig = {
 apiKey:"AIzaSyA45eoz8QZbHdFlOmuK6l6yjfJC3JaF2jQ",
 authDomain:"collibri-buisiness.firebaseapp.com",
 databaseURL:"https://collibri-buisiness-default-rtdb.firebaseio.com",
 projectId:"collibri-buisiness"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth();
const db = getDatabase(app);

onAuthStateChanged(auth, async user=>{
  if(user){
    const snap = await get(ref(db,"users/"+user.uid));
    if(snap.exists() && snap.val().type==="professionnel"){
      window.location.href="profil-pro.html";
    } else {
      window.location.href="achat.html";
    }
  }
});

window.login = async ()=>{
 const email = document.getElementById("email").value.trim();
 const password = document.getElementById("password").value.trim();
 if(!email || !password){ alert("Remplir tous les champs"); return; }
 try{
   await signInWithEmailAndPassword(auth,email,password);
 } catch(e){ alert("Erreur: "+e.message); }
};
</script>
</body>
</html>
