<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Statistiques - Colibri Business</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<header>
  <h1>Statistiques</h1>
</header>

<main id="statsList"></main>

<nav class="menu-bas">
  <a href="index.html"><i class="fas fa-home"></i></a>
  <a href="achat.html"><i class="fas fa-cart-shopping"></i></a>
  <a href="commandes.html"><i class="fas fa-box"></i></a>
  <a href="paiements.html"><i class="fas fa-credit-card"></i></a>
  <a href="statistiques.html"><i class="fas fa-chart-line"></i></a>
  <a href="chaines.html"><i class="fas fa-rss"></i></a>
</nav>

<script>
function loadStats() {
  const list = document.getElementById("statsList");
  list.innerHTML = "";
  let ventes = JSON.parse(localStorage.getItem("achats")) || [];
  if (ventes.length === 0) {
    list.innerHTML = "<p style='text-align:center;margin-top:20px;'>Aucune statistique</p>";
    return;
  }

  let total = ventes.reduce((sum, v) => sum + (v.prix * v.quantite), 0);
  let div = document.createElement("div");
  div.className = "stats-item";
  div.innerHTML = `
    <strong>Total des ventes:</strong> ${total} HTG<br>
    <strong>Nombre de ventes:</strong> ${ventes.length}
  `;
  list.appendChild(div);
}

document.addEventListener("DOMContentLoaded", loadStats);
</script>

</body>
</html>
