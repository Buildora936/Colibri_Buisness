<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Statistiques - Colibri Business</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>

<header>
  <h1>Statistiques</h1>
</header>

<main class="stats-container">

  <div class="stat-card">
    <span>💰 Total ventes</span>
    <strong id="totalVentes">0 HTG</strong>
  </div>

  <div class="stat-card">
    <span>💸 Total achats</span>
    <strong id="totalAchats">0 HTG</strong>
  </div>

  <div class="stat-card">
    <span>💳 Paiements reçus</span>
    <strong id="totalPaiements">0 HTG</strong>
  </div>

  <div class="stat-card">
    <span>📊 Bénéfice</span>
    <strong id="benefice">0 HTG</strong>
  </div>

  <div class="stat-card">
    <span>📦 Commandes</span>
    <strong id="totalCommandes">0</strong>
  </div>

  <div class="stat-card">
    <span>👥 Clients</span>
    <strong id="totalClients">0</strong>
  </div>

</main>

<nav class="menu-bas">
  <a href="achat.html"><i class="fas fa-cart-shopping"></i></a>
  <a href="commandes.html"><i class="fas fa-box"></i></a>
  <a href="paiements.html"><i class="fas fa-credit-card"></i></a>
  <a href="statistiques.html"><i class="fas fa-chart-line"></i></a>
  <a href="chaines.html"><i class="fas fa-rss"></i></a>
</nav>

<script>
function calcStats() {

  let ventes = JSON.parse(localStorage.getItem("ventes")) || [];
  let achats = JSON.parse(localStorage.getItem("achats")) || [];
  let paiements = JSON.parse(localStorage.getItem("paiements")) || [];
  let commandes = JSON.parse(localStorage.getItem("commandes")) || [];
  let clients = JSON.parse(localStorage.getItem("clients")) || [];

  let totalVentes = ventes.reduce((s, v) => s + Number(v.prix || 0), 0);
  let totalAchats = achats.reduce((s, a) => s + Number(a.montant || 0), 0);
  let totalPaiements = paiements.reduce((s, p) => s + Number(p.montant || 0), 0);

  let benefice = totalPaiements - totalAchats;

  totalVentesEl.innerText = totalVentes + " HTG";
  totalAchatsEl.innerText = totalAchats + " HTG";
  totalPaiementsEl.innerText = totalPaiements + " HTG";
  beneficeEl.innerText = benefice + " HTG";
  totalCommandesEl.innerText = commandes.length;
  totalClientsEl.innerText = clients.length;
}

const totalVentesEl = document.getElementById("totalVentes");
const totalAchatsEl = document.getElementById("totalAchats");
const totalPaiementsEl = document.getElementById("totalPaiements");
const beneficeEl = document.getElementById("benefice");
const totalCommandesEl = document.getElementById("totalCommandes");
const totalClientsEl = document.getElementById("totalClients");

calcStats();
</script>

</body>
</html>
