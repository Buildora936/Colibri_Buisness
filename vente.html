<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Publier - Colibri Business</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{font-family:Arial;margin:0}
header{background:#82CF1B;color:white;padding:14px}
form{padding:16px}
input,textarea{
 width:100%; padding:12px;
 margin-bottom:12px;
 border-radius:10px;
 border:1px solid #ccc
}
button{
 background:#82CF1B;
 color:white; border:none;
 padding:14px;
 width:100%;
 font-size:16px;
 border-radius:12px;
 font-weight:bold;
}
</style>
</head>

<body>

<header><h2>Ajouter un produit</h2></header>

<form onsubmit="return publier()">
 <input id="nom" placeholder="Nom du produit" required>
 <input id="prix" type="number" placeholder="Prix USD" required>
 <input id="image" placeholder="Lien image (obligatoire)" required>
 <input id="video" placeholder="Lien YouTube (obligatoire)" required>
 <textarea id="description" placeholder="Description" required></textarea>
 <button>Publier</button>
</form>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-app.js";
import { getDatabase, ref, push }
from "https://www.gstatic.com/firebasejs/12.7.0/firebase-database.js";
import { getAuth, signInAnonymously }
from "https://www.gstatic.com/firebasejs/12.7.0/firebase-auth.js";

const app = initializeApp({
 apiKey:"AIzaSyA45eoz8QZbHdFlOmuK6l6yjfJC3JaF2jQ",
 authDomain:"collibri-buisiness.firebaseapp.com",
 databaseURL:"https://collibri-buisiness-default-rtdb.firebaseio.com",
 projectId:"collibri-buisiness"
});

const auth = getAuth(app);
const db = getDatabase(app);
await signInAnonymously(auth);

window.publier=()=>{
 push(ref(db,"produits"),{
  nom:nom.value,
  prix:prix.value,
  image:image.value,
  video:video.value,
  description:description.value,
  vendeurId:auth.currentUser.uid,
  date:Date.now()
 });
 location.href="achat.html";
 return false;
}
</script>

</body>
</html>
