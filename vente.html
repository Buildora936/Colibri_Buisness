<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Vente - Colibri Business</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>

<header>
  <h1>Salle de Vente</h1>
</header>

<!-- PUB BANNER -->
<div class="pub-banner">
  ESPACE PUBLICITAIRE
</div>

<main id="venteList"></main>

<button class="fab" onclick="openAddVente()">+</button>

<div id="modalVente" class="modal">
  <div class="modal-content">
    <h2>Nouveau produit</h2>

    <input type="text" id="nomProduit" placeholder="Nom du produit">
    <input type="number" id="prixProduit" placeholder="Prix">

    <button onclick="saveVente()">Enregistrer</button>
    <button onclick="closeVente()">Annuler</button>
  </div>
</div>

<nav class="menu-bas">
  <a href="achat.html"><i class="fas fa-cart-shopping"></i></a>
  <a href="commandes.html"><i class="fas fa-box"></i></a>
  <a href="paiements.html"><i class="fas fa-credit-card"></i></a>
  <a href="statistiques.html"><i class="fas fa-chart-line"></i></a>
  <a href="chaines.html"><i class="fas fa-rss"></i></a>
</nav>

<script>
let ventes = JSON.parse(localStorage.getItem("ventes")) || [];

function openAddVente() {
  document.getElementById("modalVente").style.display = "flex";
}

function closeVente() {
  document.getElementById("modalVente").style.display = "none";
}

function saveVente() {
  const nom = document.getElementById("nomProduit").value;
  const prix = document.getElementById("prixProduit").value;

  if (!nom || !prix) return alert("Champs requis");

  ventes.push({ nom, prix });
  localStorage.setItem("ventes", JSON.stringify(ventes));

  closeVente();
  loadVentes();
}

function loadVentes() {
  const list = document.getElementById("venteList");
  list.innerHTML = "";

  ventes.forEach(v => {
    const div = document.createElement("div");
    div.className = "client-item";
    div.innerHTML = `
      <div>
        <strong>${v.nom}</strong><br>
        <small>${v.prix} HTG</small>
      </div>
    `;
    list.appendChild(div);
  });
}

loadVentes();
</script>

</body>
</html>
