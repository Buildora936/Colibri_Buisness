<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Publier un produit - Colibri Business</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>

<header>
  <h1>Publier un produit</h1>
</header>

<div class="pub-banner">ESPACE PUBLICITAIRE</div>

<main style="padding:16px">

  <div class="card">
    <label>Nom du vendeur</label>
    <input id="vendeur" placeholder="Ex : Jean Store">

    <label>Nom du produit</label>
    <input id="nomProduit" placeholder="Ex : Casque Bluetooth">

    <label>Prix (USD)</label>
    <input id="prixProduit" type="number" placeholder="Ex : 25">

    <label>Lien de l’image</label>
    <input id="imageProduit" placeholder="https://...">

    <button class="btn-primary" onclick="publierProduit()">
      Publier le produit
    </button>
  </div>

</main>

<nav class="menu-bas">
  <a href="achat.html"><i class="fas fa-cart-shopping"></i></a>
  <a href="commandes.html"><i class="fas fa-box"></i></a>
  <a href="paiements.html"><i class="fas fa-credit-card"></i></a>
  <a href="statistiques.html"><i class="fas fa-chart-line"></i></a>
  <a href="chaines.html"><i class="fas fa-rss"></i></a>
</nav>

<!-- 🔥 FIREBASE -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-app.js";
  import {
    getDatabase,
    ref,
    push
  } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyA45eoz8QZbHdFlOmuK6l6yjfJC3JaF2jQ",
    authDomain: "collibri-buisiness.firebaseapp.com",
    databaseURL: "https://collibri-buisiness-default-rtdb.firebaseio.com",
    projectId: "collibri-buisiness",
    messagingSenderId: "812403400254",
    appId: "1:812403400254:web:773de4e308a172d614fb6f"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const produitsRef = ref(db, "produits");

  window.publierProduit = () => {
    const v = vendeur.value.trim();
    const n = nomProduit.value.trim();
    const p = prixProduit.value.trim();
    const i = imageProduit.value.trim();

    if (!v || !n || !p || !i) {
      alert("Tous les champs sont obligatoires");
      return;
    }

    push(produitsRef, {
      vendeur: v,
      nom: n,
      prix: p,
      image: i,
      date: Date.now()
    });

    vendeur.value = "";
    nomProduit.value = "";
    prixProduit.value = "";
    imageProduit.value = "";

    alert("Produit publié avec succès");
  };
</script>

</body>
</html>
