<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Vente - Colibri Business</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
body{margin:0;font-family:Arial;background:#e6f0ff}
header{padding:16px;background:#1E3A8A;color:white;text-align:center;font-size:22px;font-weight:bold}
.pub-banner{padding:12px;background:#93c5fd;text-align:center;margin:12px;border-radius:12px}
.menu-bas{position:fixed;bottom:0;width:100%;background:#1E40AF;display:flex;justify-content:space-around;padding:10px 0}
.menu-bas a{color:white;font-size:20px;text-decoration:none}
.container{padding:12px;display:grid;grid-template-columns:1fr;gap:12px}
.card{background:white;border-radius:14px;padding:12px;box-shadow:0 2px 6px rgba(0,0,0,0.05)}
.card h3{margin:0;font-size:20px;color:#1E3A8A}
.card .price{color:#1E40AF;font-weight:bold;margin:6px 0}
.card img{width:100%;border-radius:12px;margin-top:8px}
.card iframe{width:100%;height:180px;border-radius:12px;margin-top:8px}
textarea,input{width:100%;padding:10px;border-radius:10px;border:1px solid #ccc;margin-top:8px}
button{padding:10px;border:none;border-radius:10px;font-weight:bold;cursor:pointer}
.btn-primary{background:#1E3A8A;color:white}
.btn-danger{background:red;color:white;margin-top:8px}
</style>
</head>

<body>

<header>Vente - Publier vos produits</header>
<div class="pub-banner">ESPACE PUBLICITAIRE</div>

<div class="container">
  <h3>Ajouter un produit</h3>
  <input id="nomProduit" placeholder="Nom du produit">
  <input id="prixProduit" type="number" placeholder="Prix (USD)">
  <textarea id="descProduit" placeholder="Description"></textarea>
  <input id="imageProduit" placeholder="URL image">
  <input id="videoProduit" placeholder="URL vidéo YouTube (embed)">
  <button class="btn-primary" onclick="saveVente()">Publier</button>
</div>

<div class="container" id="venteList"></div>

<nav class="menu-bas">
 <a href="achat.html"><i class="fas fa-cart-shopping"></i></a>
 <a href="commandes.html"><i class="fas fa-box"></i></a>
 <a href="paiements.html"><i class="fas fa-credit-card"></i></a>
 <a href="statistiques.html"><i class="fas fa-chart-line"></i></a>
 <a href="chaines.html"><i class="fas fa-rss"></i></a>
</nav>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-app.js";
import { getDatabase, ref, get, set, remove, push } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-database.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-auth.js";

const app = initializeApp({
 apiKey:"AIzaSyA45eoz8QZbHdFlOmuK6l6yjfJC3JaF2jQ",
 authDomain:"collibri-buisiness.firebaseapp.com",
 databaseURL:"https://collibri-buisiness-default-rtdb.firebaseio.com",
 projectId:"collibri-buisiness"
});

const db = getDatabase(app);
const auth = getAuth(app);

const venteList = document.getElementById("venteList");
let currentUser = null;

/* 🔐 Auth obligatoire */
onAuthStateChanged(auth, user => {
  if (!user) {
    window.location.href = "login.html";
  } else {
    currentUser = user.uid;
    loadVentes();
  }
});

/* ➕ Publier produit */
async function saveVente(){
 if(!currentUser) return;

 const nom = nomProduit.value.trim();
 const prix = prixProduit.value.trim();
 const desc = descProduit.value.trim();
 const image = imageProduit.value.trim();
 const video = videoProduit.value.trim();

 if(!nom || !prix || !desc || !image || !video){
   alert("Tous les champs sont obligatoires");
   return;
 }

 await set(push(ref(db,"produits")),{
   nom,
   prix,
   description: desc,
   image,
   video,
   vendeurId: currentUser
 });

 nomProduit.value=prixProduit.value=descProduit.value=imageProduit.value=videoProduit.value="";
 loadVentes();
}

/* 📦 Charger produits */
async function loadVentes(){
 venteList.innerHTML="";
 const snap = await get(ref(db,"produits"));
 if(!snap.exists()) return;

 Object.entries(snap.val()).forEach(([id,p])=>{
   if(p.vendeurId !== currentUser) return;

   const div = document.createElement("div");
   div.className="card";
   div.innerHTML=`
     <h3>${p.nom}</h3>
     <div class="price">${p.prix} USD</div>
     <p>${p.description}</p>
     <img src="${p.image}">
     <iframe src="${p.video}" allowfullscreen></iframe>
     <button class="btn-danger">Supprimer</button>
   `;
   div.querySelector("button").onclick = async ()=>{
     if(confirm("Supprimer ce produit ?")){
       await remove(ref(db,"produits/"+id));
       loadVentes();
     }
   };
   venteList.appendChild(div);
 });
}
</script>

</body>
</html>
