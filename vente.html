<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Vente - Colibri Business</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
body{margin:0;font-family:Arial;background:#e6f0ff}
header{padding:16px;background:#1E3A8A;color:white;text-align:center;font-size:22px;font-weight:bold}
.pub-banner{padding:12px;background:#93c5fd;text-align:center;margin:12px;border-radius:12px}
.menu-bas{position:fixed;bottom:0;width:100%;background:#1E40AF;display:flex;justify-content:space-around;padding:10px 0}
.menu-bas a{color:white;font-size:20px}
.container{padding:12px;display:grid;gap:12px}
.card{background:white;border-radius:14px;padding:12px}
.card img,.card iframe{width:100%;border-radius:12px;margin-top:8px}
.heart{font-size:26px;cursor:pointer;float:right}
.heart.red{color:red}
input,textarea{width:100%;padding:10px;border-radius:10px;border:1px solid #ccc}
button{padding:10px;border-radius:10px;border:none;font-weight:bold}
.btn-primary{background:#1E3A8A;color:white}
.btn-danger{background:red;color:white}
</style>
</head>

<body>

<header>Vente - Publier vos produits</header>
<div class="pub-banner">ESPACE PUBLICITAIRE</div>

<div class="container">
<input id="nomProduit" placeholder="Nom du produit">
<input id="prixProduit" type="number" placeholder="Prix (USD)">
<textarea id="descProduit" placeholder="Description"></textarea>
<input id="imageProduit" placeholder="URL image">
<input id="videoProduit" placeholder="URL vidéo YouTube embed">
<button class="btn-primary" onclick="saveVente()">Publier</button>
</div>

<div class="container" id="venteList"></div>

<nav class="menu-bas">
<a href="achat.html"><i class="fas fa-cart-shopping"></i></a>
<a href="chaines.html"><i class="fas fa-rss"></i></a>
</nav>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-app.js";
import { getDatabase, ref, push, set, get, remove } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-database.js";

const app = initializeApp({
 apiKey:"AIzaSyA45eoz8QZbHdFlOmuK6l6yjfJC3JaF2jQ",
 authDomain:"collibri-buisiness.firebaseapp.com",
 databaseURL:"https://collibri-buisiness-default-rtdb.firebaseio.com",
 projectId:"collibri-buisiness"
});

const db = getDatabase(app);
const currentUser = "vendeur1";
const venteList = document.getElementById("venteList");

async function saveVente(){
 const nom=nomProduit.value.trim();
 const prix=prixProduit.value;
 const desc=descProduit.value.trim();
 const image=imageProduit.value.trim();
 const video=videoProduit.value.trim();
 if(!nom||!prix||!desc||!image||!video) return alert("Tous les champs sont requis");

 await set(push(ref(db,"produits")),{
  nom,prix,description:desc,image,video,vendeurId:currentUser
 });
 nomProduit.value=prixProduit.value=descProduit.value=imageProduit.value=videoProduit.value="";
 loadVentes();
}

async function loadVentes(){
 venteList.innerHTML="";
 const snap=await get(ref(db,"produits"));
 if(!snap.exists()) return;
 Object.entries(snap.val()).forEach(([id,p])=>{
  const d=document.createElement("div");
  d.className="card";
  d.innerHTML=`
   <span class="heart" id="fav-${id}">🤍</span>
   <h3>${p.nom}</h3>
   <b>${p.prix} USD</b>
   <p>${p.description}</p>
   <img src="${p.image}">
   <iframe src="${p.video}" allowfullscreen></iframe>
   ${p.vendeurId===currentUser?`<button class="btn-danger" id="del-${id}">Supprimer</button>`:""}
  `;
  venteList.appendChild(d);

  document.getElementById(`fav-${id}`).onclick=()=>document.getElementById(`fav-${id}`).classList.toggle("red");
  if(p.vendeurId===currentUser){
   document.getElementById(`del-${id}`).onclick=async()=>{
    await remove(ref(db,`produits/${id}`));
    loadVentes();
   }
  }
 });
}
loadVentes();
</script>

</body>
</html>
