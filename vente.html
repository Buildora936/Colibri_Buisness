<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Vente - Colibri Business</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>

<header>
  <h1>Publier un produit</h1>
</header>

<div class="pub-banner">ESPACE PUBLICITAIRE</div>

<section style="padding:16px">
  <input id="vendeur" placeholder="Nom du vendeur">
  <input id="nomProduit" placeholder="Nom du produit">
  <input id="prixProduit" type="number" placeholder="Prix (USD)">
  <input id="imageProduit" placeholder="Lien image (https://...)">

  <button class="btn-primary" onclick="publierProduit()">
    Publier le produit
  </button>
</section>

<section style="padding:16px">
  <input id="search" placeholder="🔍 Rechercher un produit..." oninput="filtrer()">
</section>

<main id="venteList"></main>

<nav class="menu-bas">
  <a href="achat.html"><i class="fas fa-cart-shopping"></i></a>
  <a href="commandes.html"><i class="fas fa-box"></i></a>
  <a href="paiements.html"><i class="fas fa-credit-card"></i></a>
  <a href="statistiques.html"><i class="fas fa-chart-line"></i></a>
  <a href="chaines.html"><i class="fas fa-rss"></i></a>
</nav>

<!-- FIREBASE -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-app.js";
  import { getDatabase, ref, push, onValue } from
    "https://www.gstatic.com/firebasejs/12.7.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyA45eoz8QZbHdFlOmuK6l6yjfJC3JaF2jQ",
    authDomain: "collibri-buisiness.firebaseapp.com",
    databaseURL: "https://collibri-buisiness-default-rtdb.firebaseio.com",
    projectId: "collibri-buisiness",
    messagingSenderId: "812403400254",
    appId: "1:812403400254:web:773de4e308a172d614fb6f"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const refProduits = ref(db, "produits");

  let produits = [];

  window.publierProduit = () => {
    if (!vendeur.value || !nomProduit.value || !prixProduit.value || !imageProduit.value) {
      alert("Tous les champs sont requis");
      return;
    }

    push(refProduits, {
      vendeur: vendeur.value,
      nom: nomProduit.value,
      prix: prixProduit.value,
      image: imageProduit.value,
      date: Date.now()
    });

    vendeur.value = nomProduit.value = prixProduit.value = imageProduit.value = "";
  };

  onValue(refProduits, snap => {
    produits = [];
    snap.forEach(c => produits.push(c.val()));
    afficher(produits);
  });

  function afficher(list) {
    venteList.innerHTML = "";
    list.reverse().forEach(p => {
      const div = document.createElement("div");
      div.className = "client-item";

      div.innerHTML = `
        <div style="position:relative">
          <img src="${p.image}" style="width:100%;border-radius:12px">
          <div style="position:absolute;top:8px;right:8px">⋮</div>
        </div>

        <strong>${p.nom}</strong><br>
        <small>${p.prix} USD</small><br>
        <small>👤 ${p.vendeur}</small><br>

        <button style="margin-top:8px;width:100%" onclick="commander('${p.nom}')">
          Commander
        </button>
      `;
      venteList.appendChild(div);
    });
  }

  window.filtrer = () => {
    const v = search.value.toLowerCase();
    afficher(produits.filter(p => p.nom.toLowerCase().includes(v)));
  };

  window.commander = nom => {
    alert("Commande pour : " + nom);
  };
</script>

</body>
</html>
