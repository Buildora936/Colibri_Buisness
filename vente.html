<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Vente - Colibri Business</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    .form-box {
      padding: 16px;
    }

    .form-box input, .form-box textarea {
      width: 100%;
      padding: 12px;
      margin-bottom: 12px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    .btn-publish {
      background: #82CF1B;
      color: white;
      padding: 14px;
      width: 100%;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }

    .delete-btn {
      background: #ff5252;
      color: white;
      border: none;
      padding: 8px 12px;
      border-radius: 6px;
      cursor: pointer;
      margin-top: 8px;
    }
  </style>
</head>

<body>

<header>
  <h1>Publier un produit</h1>
</header>

<div class="form-box">
  <input type="text" id="nom" placeholder="Nom du produit">
  <input type="number" id="prix" placeholder="Prix (USD)">
  <textarea id="description" placeholder="Description du produit"></textarea>
  <input type="url" id="video" placeholder="Lien vidéo (YouTube ou autre)">

  <button class="btn-publish" onclick="publierProduit()">
    Publier le produit
  </button>
</div>

<main id="listeProduits" style="padding:16px"></main>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-app.js";
  import { getDatabase, ref, push, onValue, remove }
    from "https://www.gstatic.com/firebasejs/12.7.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyA45eoz8QZbHdFlOmuK6l6yjfJC3JaF2jQ",
    authDomain: "collibri-buisiness.firebaseapp.com",
    databaseURL: "https://collibri-buisiness-default-rtdb.firebaseio.com",
    projectId: "collibri-buisiness",
    appId: "1:812403400254:web:773de4e308a172d614fb6f"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const produitsRef = ref(db, "produits");

  window.publierProduit = () => {
    const nom = document.getElementById("nom").value;
    const prix = document.getElementById("prix").value;
    const description = document.getElementById("description").value;
    const video = document.getElementById("video").value;

    if (!nom || !prix || !description)
      return alert("Tous les champs sont obligatoires");

    push(produitsRef, {
      nom,
      prix,
      description,
      video,
      date: Date.now()
    });

    document.querySelectorAll("input, textarea").forEach(e => e.value = "");
  };

  onValue(produitsRef, snap => {
    const list = document.getElementById("listeProduits");
    list.innerHTML = "";

    snap.forEach(p => {
      const d = p.val();
      const div = document.createElement("div");
      div.className = "client-item";
      div.innerHTML = `
        <strong>${d.nom}</strong><br>
        <small>${d.prix} USD</small><br>
        <p>${d.description}</p>
        ${d.video ? `<a href="${d.video}" target="_blank">🎥 Voir la vidéo</a>` : ""}
        <br>
        <button class="delete-btn" onclick="supprimerProduit('${p.key}')">
          Supprimer
        </button>
      `;
      list.appendChild(div);
    });
  });

  window.supprimerProduit = id => {
    if (confirm("Supprimer ce produit ?")) {
      remove(ref(db, "produits/" + id));
    }
  };
</script>

</body>
</html>
