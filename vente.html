<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Vente - Colibri Business</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>

<header>
  <h1>Salle de Vente</h1>
</header>

<div class="pub-banner">ESPACE PUBLICITAIRE</div>

<!-- FORMULAIRE PRODUIT (VISIBLE) -->
<section style="padding:15px">
  <h2>Publier un produit</h2>

  <input type="text" id="nomProduit" placeholder="Nom du produit">
  <input type="number" id="prixProduit" placeholder="Prix (HTG)">
  <input type="url" id="imageProduit" placeholder="Lien de l’image (https://...)">

  <button onclick="saveVente()">Publier</button>
</section>

<main id="venteList"></main>

<nav class="menu-bas">
  <a href="achat.html"><i class="fas fa-cart-shopping"></i></a>
  <a href="commandes.html"><i class="fas fa-box"></i></a>
  <a href="paiements.html"><i class="fas fa-credit-card"></i></a>
  <a href="statistiques.html"><i class="fas fa-chart-line"></i></a>
  <a href="chaines.html"><i class="fas fa-rss"></i></a>
</nav>

<!-- 🔥 SCRIPT FIREBASE -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-app.js";
  import {
    getDatabase,
    ref,
    push,
    onValue
  } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyA45eoz8QZbHdFlOmuK6l6yjfJC3JaF2jQ",
    authDomain: "collibri-buisiness.firebaseapp.com",
    databaseURL: "https://collibri-buisiness-default-rtdb.firebaseio.com",
    projectId: "collibri-buisiness",
    storageBucket: "collibri-buisiness.firebasestorage.app",
    messagingSenderId: "812403400254",
    appId: "1:812403400254:web:773de4e308a172d614fb6f"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const produitsRef = ref(db, "produits");

  window.saveVente = () => {
    const nom = nomProduit.value.trim();
    const prix = prixProduit.value.trim();
    const image = imageProduit.value.trim();

    if (!nom || !prix || !image) {
      alert("Tous les champs sont obligatoires");
      return;
    }

    push(produitsRef, {
      nom,
      prix,
      image,
      date: Date.now()
    });

    nomProduit.value = "";
    prixProduit.value = "";
    imageProduit.value = "";
  };

  onValue(produitsRef, snapshot => {
    venteList.innerHTML = "";
    snapshot.forEach(child => {
      const p = child.val();

      const div = document.createElement("div");
      div.className = "client-item";
      div.innerHTML = `
        <img src="${p.image}" style="width:100%;border-radius:10px;margin-bottom:8px">
        <strong>${p.nom}</strong><br>
        <small>${p.prix} HTG</small>
      `;
      venteList.prepend(div);
    });
  });
</script>

</body>
</html>
