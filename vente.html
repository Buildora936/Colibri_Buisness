<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Vente - Colibri Business</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>

<header>
  <h1>Nouvelle Vente</h1>
</header>

<main>
  <div class="card">
    <label>Titre du produit</label>
    <input id="vTitre" placeholder="Ex : Produit A">

    <label>Description</label>
    <input id="vDesc" placeholder="Description du produit">

    <label>Prix</label>
    <input id="vPrix" type="number" placeholder="Ex : 1500 HTG">

    <label>Média (image ou vidéo)</label>
    <input id="vMedia" type="file" accept="image/*,video/*">

    <button class="btn-primary" onclick="saveVente()">Enregistrer</button>
  </div>
</main>

<nav class="menu-bas">
  <a href="achat.html"><i class="fas fa-cart-shopping"></i></a>
  <a href="commandes.html"><i class="fas fa-box"></i></a>
  <a href="paiements.html"><i class="fas fa-credit-card"></i></a>
  <a href="statistiques.html"><i class="fas fa-chart-line"></i></a>
  <a href="chaines.html"><i class="fas fa-rss"></i></a>
</nav>

<script>
function saveVente() {
  const titre = vTitre.value.trim();
  const desc = vDesc.value.trim();
  const prix = vPrix.value;
  const file = vMedia.files[0];

  if (!titre || !prix) {
    alert("Titre et prix sont obligatoires");
    return;
  }

  let ventes = JSON.parse(localStorage.getItem("ventes")) || [];

  if (file) {
    const reader = new FileReader();
    reader.onload = function () {
      storeVente(reader.result, file.type);
    };
    reader.readAsDataURL(file);
  } else {
    storeVente(null, null);
  }

  function storeVente(media, mediaType) {
    ventes.push({
      id: Date.now(),
      titre,
      desc,
      prix,
      media,
      mediaType,
      date: new Date().toLocaleDateString()
    });

    localStorage.setItem("ventes", JSON.stringify(ventes));
    alert("Vente enregistrée !");
    window.location.href = "achat.html"; // retour automatique
  }
}
</script>

</body>
</html>
